version: '3.8'

services:
  app:
    build: .
    container_name: bhspl-attendance-app
    restart: unless-stopped
    expose:
      - "8080"
      - "8081"
    environment:
      - TZ=Asia/Kolkata
      # Database connection configuration pointing to the host's MySQL
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: bhspl-nginx
    restart: unless-stopped
    ports:
      # Exposes the system on port 9002 (as requested)
      - "9002:9002"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
