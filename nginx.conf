events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Basic performance tuning
    sendfile        on;
    keepalive_timeout  65;
    
    server {
        listen 9002;
        server_name _;

        # Increase upload limit (biometric log packets can be large)
        client_max_body_size 50M;

        # ADMS Biometric Device Push Service (handles requests like /iclock/cdata, /iclock/getrequest)
        location /iclock/ {
            proxy_pass http://app:8081;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 9002;
            
            # Disable proxy buffering for real-time bi-directional device communication
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Web Portal (Thymeleaf UI / Spring Boot controller endpoints)
        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 9002;
            
            proxy_read_timeout 300s;
        }
    }
}
