<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'User Management', 'system')}">
<body>
    <section>
        <div class="module-header">
            <div>
                <h2 class="module-title">User Accounts</h2>
                <div class="module-sub">Manage system operators, access permissions, and roles</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="filter-bar">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <!-- Excel Export Group -->
                    <div style="display: flex; align-items: center;">
                        <button type="button" onclick="performFullExport('System_Users.xls')" class="btn-primary" style="background: #10b981; color: #fff; border-radius: 10px 0 0 10px; font-size: 12px; padding: 10px 12px;" title="Export ALL records across all pages">
                            <i class="fas fa-database"></i> Full Excel
                        </button>
                        <button type="button" onclick="exportCurrentPage('System_Users.xls')" class="btn-primary" style="background: #059669; color: #fff; border-radius: 0 10px 10px 0; font-size: 12px; padding: 10px 8px; border-left: 1px solid rgba(255,255,255,0.15);" title="Export current page only">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>
                    <button type="button" class="btn-primary" style="background: rgba(13, 148, 136, 0.08); color: #0d9488; border: 1px solid rgba(13, 148, 136, 0.15); font-size: 12px; padding: 10px 12px;" onclick="exportTableToCSV('System_Users.csv')">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button class="btn-primary" style="background: #10B981;" onclick="openUserModal()" th:if="${session.role == 'Admin'}"><i class="fas fa-plus"></i> Add User</button>
                    <button class="btn-primary" style="background: #64748B;" onclick="refreshAndSync()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="mainDataTable" class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Emp ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}" th:data-id="${u.id}" th:data-user="${u.username}" th:data-role="${u.role}" th:data-empid="${u.emp_id}" th:data-status="${u.status}" th:data-allowed-devices="${u.allowed_devices}" th:data-allowed-modules="${u.allowed_modules}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}" style="font-weight: 600; color: var(--text-main);">admin</td>
                        <td th:text="${u.role}">Admin</td>
                        <td th:text="${u.emp_id}">N/A</td>
                        <td>
                            <span th:text="${u.status}" 
                                  th:classappend="${u.status == 'Active' ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Active</span>
                        </td>
                        <td th:text="${u.last_login}">2026-05-06 10:00:00</td>
                        <td>
                            <div class="action-col" style="justify-content: center; gap: 6px;">
                                <button class="action-btn edit" title="Edit" onclick="editUser(this)"><i class="fas fa-pen"></i></button>
                                <button th:if="${session.role == 'Admin'}" class="action-btn edit" style="color: #F59E0B; background: rgba(245, 158, 11, 0.08); border-color: rgba(245, 158, 11, 0.15);" title="Reset Password" onclick="resetUserPass(this)"><i class="fas fa-key"></i></button>
                                <button th:if="${session.role == 'Admin'}" class="action-btn edit" style="color: #334155; background: rgba(51, 65, 85, 0.08); border-color: rgba(51, 65, 85, 0.15);" title="Toggle Status" onclick="toggleUserStatus(this)"><i class="fas fa-exchange-alt"></i></button>
                                <button th:if="${session.role == 'Admin'}" class="action-btn delete" title="Delete" onclick="deleteUser(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="padding: 15px;">
                <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/system/users')}"></div>
            </div>
        </div>

        <!-- User Modal -->
        <div id="userModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Create System User</h3>
                    <span class="close" onclick="closeUserModal()">&times;</span>
                </div>
                <form action="/system/users/save" method="post" id="userForm" autocomplete="off">
                    <input type="hidden" name="id" id="userId">
                    <div style="padding: 25px;">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="form-group" id="passGroup" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div>
                                <label>Password</label>
                                <div style="position: relative;">
                                    <input type="password" name="password" id="password" class="form-control" autocomplete="new-password" required style="padding-right: 40px;">
                                    <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8;"></i>
                                </div>
                            </div>
                            <div>
                                <label>Confirm Password</label>
                                <div style="position: relative;">
                                    <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" autocomplete="new-password" required style="padding-right: 40px;">
                                    <i class="fas fa-eye" id="toggleConfirmPassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8;"></i>
                                </div>
                            </div>
                        </div>
                        <div th:if="${session.role == 'Admin'}">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label>System Role</label>
                                    <input list="roleList" name="role" id="role" class="form-control" placeholder="Select or type a role" required autocomplete="off">
                                    <datalist id="roleList">
                                        <option value="Admin"></option>
                                        <option value="Operator"></option>
                                        <option value="HR"></option>
                                        <th:block th:each="r : ${existingRoles}">
                                            <option th:if="${r.role != 'Admin' and r.role != 'Operator' and r.role != 'HR'}" th:value="${r.role}"></option>
                                        </th:block>
                                    </datalist>
                                </div>
                                <div class="form-group">
                                    <label>Employee ID</label>
                                    <input type="text" name="empId" id="empId" class="form-control" placeholder="Optional">
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: 15px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Allowed Devices</label>
                                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; max-height: 120px; overflow-y: auto; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
                                    <div th:each="dev : ${activeDevices}" style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" name="allowedDevices" th:value="${dev.device_id}" class="device-checkbox" style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                                        <span th:text="${dev.device_name}" style="font-size: 13px; color: var(--text-main);">Device</span>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: 15px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Allowed Modules</label>
                                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 10px; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px;">
                                    <div th:each="moduleName : ${allModules}" style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" name="allowedModules" th:value="${moduleName}" class="module-checkbox" style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                                        <span th:text="${moduleName}" style="font-size: 13px; color: var(--text-main);">Module</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);" onclick="closeUserModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Account</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Reset Password Modal -->
        <div id="resetPassModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Reset User Password</h3>
                    <span class="close" onclick="document.getElementById('resetPassModal').style.display='none'">&times;</span>
                </div>
                <form action="/system/users/reset-password" method="POST" autocomplete="off">
                    <input type="hidden" name="id" id="resetUserId">
                    <div style="padding: 25px;">
                        <div class="form-group">
                            <label>New Secure Password</label>
                            <input type="password" name="password" class="form-control" autocomplete="new-password" required placeholder="Enter new password">
                        </div>
                        <p style="color: var(--text-muted); font-size: 12px; margin-top: 10px;">
                            <i class="fas fa-info-circle"></i> This will immediately update the user's login credentials.
                        </p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);" onclick="document.getElementById('resetPassModal').style.display='none'">Cancel</button>
                        <button type="submit" class="btn-primary">Update Password</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openUserModal() {
                document.getElementById('userForm').reset();
                document.getElementById('userId').value = '';
                document.getElementById('passGroup').style.display = 'grid';
                document.getElementById('password').required = true;
                document.getElementById('confirmPassword').required = true;
                document.getElementById('password').type = 'password';
                document.getElementById('confirmPassword').type = 'password';
                document.getElementById('togglePassword').className = 'fas fa-eye';
                document.getElementById('toggleConfirmPassword').className = 'fas fa-eye';
                document.getElementById('modalTitle').innerText = 'Create System User';
                
                // Clear checkboxes
                document.querySelectorAll('.device-checkbox').forEach(cb => cb.checked = false);
                document.querySelectorAll('.module-checkbox').forEach(cb => cb.checked = false);
                
                document.getElementById('userModal').style.display = 'flex';
            }
            
            function closeUserModal() {
                document.getElementById('userModal').style.display = 'none';
            }

            function editUser(btn) {
                const tr = btn.closest('tr');
                document.getElementById('userId').value = tr.dataset.id;
                document.getElementById('username').value = tr.dataset.user;
                
                let roleEl = document.getElementById('role');
                if (roleEl) roleEl.value = tr.dataset.role;
                
                let empIdEl = document.getElementById('empId');
                if (empIdEl) empIdEl.value = tr.dataset.empid !== 'N/A' ? tr.dataset.empid : '';
                
                document.getElementById('passGroup').style.display = 'grid';
                document.getElementById('password').value = '';
                document.getElementById('confirmPassword').value = '';
                document.getElementById('password').required = false;
                document.getElementById('confirmPassword').required = false;
                document.getElementById('password').type = 'password';
                document.getElementById('confirmPassword').type = 'password';
                document.getElementById('togglePassword').className = 'fas fa-eye';
                document.getElementById('toggleConfirmPassword').className = 'fas fa-eye';
                document.getElementById('modalTitle').innerText = 'Edit System User';
                
                // Check checkboxes based on allowed-devices
                const allowedStr = tr.dataset.allowedDevices || '';
                const allowedList = allowedStr.split(',').map(s => s.trim());
                document.querySelectorAll('.device-checkbox').forEach(cb => {
                    cb.checked = allowedList.includes(cb.value);
                });
                
                // Check checkboxes based on allowed-modules
                const allowedModStr = tr.dataset.allowedModules || '';
                const allowedModList = allowedModStr.split(',').map(s => s.trim());
                document.querySelectorAll('.module-checkbox').forEach(cb => {
                    cb.checked = allowedModList.includes(cb.value);
                });
                
                document.getElementById('userModal').style.display = 'flex';
            }

            // Password visibility toggles
            document.getElementById('togglePassword').addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.className = 'fas fa-eye-slash';
                } else {
                    passwordInput.type = 'password';
                    this.className = 'fas fa-eye';
                }
            });

            document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
                const confirmPasswordInput = document.getElementById('confirmPassword');
                if (confirmPasswordInput.type === 'password') {
                    confirmPasswordInput.type = 'text';
                    this.className = 'fas fa-eye-slash';
                } else {
                    confirmPasswordInput.type = 'password';
                    this.className = 'fas fa-eye';
                }
            });

            // Password matching validation on form submit
            document.getElementById('userForm').addEventListener('submit', function(e) {
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const userId = document.getElementById('userId').value;
                
                // If it is editing (userId is not empty), and both password fields are completely empty, that is valid (optional).
                if (userId && !password && !confirmPassword) {
                    return true;
                }
                
                // Otherwise, they must match.
                if (password !== confirmPassword) {
                    e.preventDefault();
                    showAlert('Validation Error', 'Password and Confirm Password do not match.');
                    return false;
                }
            });

            // Handle success/error messages from URL
            window.addEventListener('DOMContentLoaded', () => {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('success')) {
                    showAlert('Success', urlParams.get('success'));
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else if (urlParams.has('error')) {
                    showAlert('Error', urlParams.get('error'));
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            });

            function resetUserPass(btn) {
                const tr = btn.closest('tr');
                document.getElementById('resetUserId').value = tr.dataset.id;
                document.getElementById('resetPassModal').style.display = 'flex';
            }

            function toggleUserStatus(btn) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                const status = tr.dataset.status;
                const newStatus = status === 'Active' ? 'Inactive' : 'Active';
                
                showConfirm('Toggle Status', 'Change user status to ' + newStatus + '?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/toggle-status';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = id;
                    const statusInput = document.createElement('input'); statusInput.name = 'status'; statusInput.value = status;
                    form.appendChild(idInput); form.appendChild(statusInput);
                    document.body.appendChild(form); form.submit();
                });
            }

            function deleteUser(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete User', 'Are you sure you want to delete system user "' + tr.dataset.user + '"?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                });
            }
        </script>
    </section>
</body>
</html>
