<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'System Users', 'system')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--accent-purple);"><i class="fas fa-users-cog"></i> System User Management</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <!-- Excel Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('System_Users.xls')" class="btn-primary" style="background: #10b981; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 10px 15px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;" title="Export ALL records across all pages">
                            <i class="fas fa-database"></i> Full Excel
                        </button>
                        <button type="button" onclick="exportCurrentPage('System_Users.xls')" class="btn-primary" style="background: #059669; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 10px 12px; border: none; cursor: pointer; display: flex; align-items: center;" title="Export current page only">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>
                    <button type="button" class="btn-primary" style="background: rgba(13, 148, 136, 0.1); color: #2DD4BF; border: 1px solid rgba(13, 148, 136, 0.2); border-radius: 12px; font-size: 13px; padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="exportTableToCSV('System_Users.csv')">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button class="btn-primary" style="background: #10B981;" onclick="openUserModal()"><i class="fas fa-plus"></i> Add User</button>
                    <button class="btn-primary" style="background: #f1f5f9; color: var(--text-main); border: 1px solid var(--glass-border);" onclick="refreshAndSync()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table id="mainDataTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Emp ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}" th:data-id="${u.id}" th:data-user="${u.username}" th:data-role="${u.role}" th:data-empid="${u.emp_id}" th:data-status="${u.status}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}" style="font-weight: 600;">admin</td>
                        <td th:text="${u.role}">Admin</td>
                        <td th:text="${u.emp_id}">N/A</td>
                        <td>
                            <span th:text="${u.status}" 
                                  th:classappend="${u.status == 'Active' ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Active</span>
                        </td>
                        <td th:text="${u.last_login}">2026-05-06 10:00:00</td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editUser(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn edit" style="color: #F59E0B; background: rgba(245, 158, 11, 0.1);" title="Reset Password" onclick="resetUserPass(this)"><i class="fas fa-key"></i></button>
                                <button class="action-btn edit" style="color: #334155; background: rgba(51, 65, 85, 0.1);" title="Toggle Status" onclick="toggleUserStatus(this)"><i class="fas fa-exchange-alt"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteUser(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/system/users')}"></div>
        </div>

        <!-- User Modal -->
        <div id="userModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Create System User</h3>
                    <span class="close" onclick="closeUserModal()">&times;</span>
                </div>
                <form action="/system/users/save" method="post" id="userForm" autocomplete="off">
                    <input type="hidden" name="id" id="userId">
                    <div style="padding: 25px;">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="form-group" id="passGroup">
                            <label>Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label>System Role</label>
                                <select name="role" id="role" class="form-control">
                                    <option>Admin</option>
                                    <option>Operator</option>
                                    <option>HR</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Employee ID</label>
                                <input type="text" name="empId" id="empId" class="form-control" placeholder="Optional">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);" onclick="closeUserModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Account</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Reset Password Modal -->
        <div id="resetPassModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Reset User Password</h3>
                    <span class="close" onclick="document.getElementById('resetPassModal').style.display='none'">&times;</span>
                </div>
                <form action="/system/users/reset-password" method="POST">
                    <input type="hidden" name="id" id="resetUserId">
                    <div style="padding: 25px;">
                        <div class="form-group">
                            <label>New Secure Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="Enter new password">
                        </div>
                        <p style="color: var(--text-muted); font-size: 12px; margin-top: 10px;">
                            <i class="fas fa-info-circle"></i> This will immediately update the user's login credentials.
                        </p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);" onclick="document.getElementById('resetPassModal').style.display='none'">Cancel</button>
                        <button type="submit" class="btn-primary">Update Password</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openUserModal() {
                document.getElementById('userForm').reset();
                document.getElementById('userId').value = '';
                document.getElementById('passGroup').style.display = 'block';
                document.getElementById('modalTitle').innerText = 'Create System User';
                document.getElementById('userModal').style.display = 'flex';
            }
            
            function closeUserModal() {
                document.getElementById('userModal').style.display = 'none';
            }

            function editUser(btn) {
                const tr = btn.closest('tr');
                document.getElementById('userId').value = tr.dataset.id;
                document.getElementById('username').value = tr.dataset.user;
                document.getElementById('role').value = tr.dataset.role;
                document.getElementById('empId').value = tr.dataset.empid !== 'N/A' ? tr.dataset.empid : '';
                
                document.getElementById('passGroup').style.display = 'none';
                document.getElementById('modalTitle').innerText = 'Edit System User';
                document.getElementById('userModal').style.display = 'flex';
            }

            function resetUserPass(btn) {
                const tr = btn.closest('tr');
                document.getElementById('resetUserId').value = tr.dataset.id;
                document.getElementById('resetPassModal').style.display = 'flex';
            }

            function toggleUserStatus(btn) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                const status = tr.dataset.status;
                const newStatus = status === 'Active' ? 'Inactive' : 'Active';
                
                showConfirm('Toggle Status', 'Change user status to ' + newStatus + '?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/toggle-status';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = id;
                    const statusInput = document.createElement('input'); statusInput.name = 'status'; statusInput.value = status;
                    form.appendChild(idInput); form.appendChild(statusInput);
                    document.body.appendChild(form); form.submit();
                });
            }

            function deleteUser(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete User', 'Are you sure you want to delete system user "' + tr.dataset.user + '"?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                });
            }
        </script>
    </section>
</body>
</html>
