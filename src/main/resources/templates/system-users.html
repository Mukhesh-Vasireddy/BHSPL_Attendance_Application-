<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'System Users', 'system')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--accent-purple);"><i class="fas fa-users-cog"></i> System User Management</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openUserModal()"><i class="fas fa-plus"></i> Add User</button>
                    <button class="btn-primary" style="background: #64748B;" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Emp ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}" th:data-id="${u.id}" th:data-user="${u.username}" th:data-role="${u.role}" th:data-empid="${u.emp_id}" th:data-status="${u.status}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}" style="font-weight: 600;">admin</td>
                        <td th:text="${u.role}">Admin</td>
                        <td th:text="${u.emp_id}">N/A</td>
                        <td>
                            <span th:text="${u.status}" 
                                  th:classappend="${u.status == 'Active' ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Active</span>
                        </td>
                        <td th:text="${u.last_login}">2026-05-06 10:00:00</td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editUser(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn edit" style="color: #F59E0B; background: rgba(245, 158, 11, 0.1);" title="Reset Password" onclick="resetUserPass(this)"><i class="fas fa-key"></i></button>
                                <button class="action-btn edit" style="color: #334155; background: rgba(51, 65, 85, 0.1);" title="Toggle Status" onclick="toggleUserStatus(this)"><i class="fas fa-exchange-alt"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteUser(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- User Modal -->
        <div id="userModal" class="modal">
            <div class="modal-content" style="max-width: 400px;">
                <div class="modal-header">
                    <h3>Create System User</h3>
                    <span class="close" onclick="closeUserModal()">&times;</span>
                </div>
                <form action="/system/users/save" method="post" id="userForm">
                    <div style="padding: 20px;">
                        <div class="form-group">
                            <label>Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>System Role</label>
                            <select name="role" class="form-control">
                                <option>Admin</option>
                                <option>Operator</option>
                                <option>HR</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Employee ID</label>
                            <input type="text" name="empId" class="form-control" placeholder="Optional">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #64748B;" onclick="closeUserModal()">Cancel</button>
                        <button type="submit" class="btn-primary" style="background: #10B981;">Create Account</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openUserModal() {
                document.getElementById('userModal').style.display = 'flex';
            }
            function closeUserModal() {
                document.getElementById('userModal').style.display = 'none';
            }

            function resetUserPass(btn) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                const newPass = prompt('Enter new password for the user:');
                if (newPass) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/reset-password';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = id;
                    const passInput = document.createElement('input'); passInput.name = 'password'; passInput.value = newPass;
                    form.appendChild(idInput); form.appendChild(passInput);
                    document.body.appendChild(form); form.submit();
                }
            }

            function toggleUserStatus(btn) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                const status = tr.dataset.status;
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/system/users/toggle-status';
                const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = id;
                const statusInput = document.createElement('input'); statusInput.name = 'status'; statusInput.value = status;
                form.appendChild(idInput); form.appendChild(statusInput);
                document.body.appendChild(form); form.submit();
            }

            function deleteUser(btn) {
                const tr = btn.closest('tr');
                if (confirm('Delete system user #' + tr.dataset.id + '?')) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                }
            }
        </script>
    </section>
</body>
</html>
