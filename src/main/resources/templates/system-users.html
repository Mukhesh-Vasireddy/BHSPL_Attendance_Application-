<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'System Users', 'system')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--accent-purple);"><i class="fas fa-users-cog"></i> System User Management</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openUserModal()"><i class="fas fa-plus"></i> Add User</button>
                    <button class="btn-primary" style="background: #6366F1;" onclick="promptReset()"><i class="fas fa-key"></i> Reset Password</button>
                    <button class="btn-primary" style="background: #334155;" onclick="toggleStatus()"><i class="fas fa-eye-slash"></i> Toggle Status</button>
                    <button class="btn-primary" style="background: #64748B;" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox"></th>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Emp ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}" th:data-id="${u.id}" th:data-status="${u.status}">
                        <td><input type="checkbox" class="row-check" th:value="${u.id}"></td>
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}" style="font-weight: 600;">admin</td>
                        <td th:text="${u.role}">Admin</td>
                        <td th:text="${u.emp_id}">N/A</td>
                        <td>
                            <span th:text="${u.status}" 
                                  th:classappend="${u.status == 'Active' ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Active</span>
                        </td>
                        <td th:text="${u.last_login}">2026-05-06 10:00:00</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- User Modal -->
        <div id="userModal" class="modal">
            <div class="modal-content" style="max-width: 400px;">
                <div class="modal-header">
                    <h3>Create System User</h3>
                    <span class="close" onclick="closeUserModal()">&times;</span>
                </div>
                <form action="/system/users/save" method="post" id="userForm">
                    <div style="padding: 20px;">
                        <div class="form-group">
                            <label>Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>System Role</label>
                            <select name="role" class="form-control">
                                <option>Admin</option>
                                <option>Operator</option>
                                <option>HR</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Employee ID</label>
                            <input type="text" name="empId" class="form-control" placeholder="Optional">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #64748B;" onclick="closeUserModal()">Cancel</button>
                        <button type="submit" class="btn-primary" style="background: #10B981;">Create Account</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openUserModal() {
                document.getElementById('userModal').style.display = 'flex';
            }
            function closeUserModal() {
                document.getElementById('userModal').style.display = 'none';
            }

            function promptReset() {
                const selected = document.querySelector('.row-check:checked');
                if (!selected) { alert('Please select a user first.'); return; }
                const newPass = prompt('Enter new password for the user:');
                if (newPass) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/system/users/reset-password';
                    
                    const idInput = document.createElement('input');
                    idInput.name = 'id';
                    idInput.value = selected.value;
                    form.appendChild(idInput);
                    
                    const passInput = document.createElement('input');
                    passInput.name = 'password';
                    passInput.value = newPass;
                    form.appendChild(passInput);
                    
                    document.body.appendChild(form);
                    form.submit();
                }
            }

            function toggleStatus() {
                const selected = document.querySelector('.row-check:checked');
                if (!selected) { alert('Please select a user first.'); return; }
                const row = selected.closest('tr');
                const status = row.dataset.status;
                
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/system/users/toggle-status';
                
                const idInput = document.createElement('input');
                idInput.name = 'id';
                idInput.value = selected.value;
                form.appendChild(idInput);
                
                const statusInput = document.createElement('input');
                statusInput.name = 'status';
                statusInput.value = status;
                form.appendChild(statusInput);
                
                document.body.appendChild(form);
                form.submit();
            }
        </script>
    </section>
</body>
</html>
