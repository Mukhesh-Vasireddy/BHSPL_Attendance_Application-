<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'About System', 'system')}">
<body>
    <section style="height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 0;">
        <style>
            .main-content { overflow: hidden !important; }
        </style>
        <div style="width: 100%; display: flex; justify-content: center;">
            <div class="card" style="width: 100%; max-width: 800px; padding: 0; overflow: hidden; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 30px; box-shadow: var(--card-shadow);">
                <!-- Header with Gradient -->
                <div style="background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); padding: 25px 40px; display: flex; align-items: center; gap: 25px; position: relative; overflow: hidden;">
                    <div style="font-size: 70px; color: rgba(255, 255, 255, 0.15); position: absolute; right: -20px; bottom: -20px;">
                        <i class="fas fa-fingerprint"></i>
                    </div>
                    <div style="background: rgba(255, 255, 255, 0.15); width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);">
                        <i class="fas fa-fingerprint"></i>
                    </div>
                    <div style="z-index: 1;">
                        <h1 style="color: white; margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px;">BHSPL Attendance</h1>
                        <p style="color: rgba(255, 255, 255, 0.85); margin: 4px 0 0; font-size: 14px; font-weight: 500;">Enterprise Edition | <span style="background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700;">v2.0.42</span></p>
                    </div>
                </div>

                <!-- Info Grid -->
                <div style="padding: 25px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                    <!-- Company Section -->
                    <div style="background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border);">
                        <h4 style="color: var(--accent-primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-building"></i> Company Info
                        </h4>
                        <div style="display: grid; gap: 15px;">
                            <div>
                                <p style="color: var(--text-muted); font-size: 11px; font-weight: 600; margin-bottom: 4px; text-transform: uppercase;">Proprietor</p>
                                <p style="font-weight: 600; color: var(--text-main); font-size: 15px;">Bavya Health Services Pvt Ltd</p>
                            </div>
                            <div>
                                <p style="color: var(--text-muted); font-size: 11px; font-weight: 600; margin-bottom: 4px; text-transform: uppercase;">Headquarters</p>
                                <p style="font-weight: 600; color: var(--text-main); font-size: 15px;">Vijayawada, Andhra Pradesh</p>
                            </div>
                        </div>
                    </div>

                    <!-- Support Section -->
                    <div style="background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border);">
                        <h4 style="color: var(--accent-secondary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-headset"></i> Support
                        </h4>
                        <div style="display: grid; gap: 15px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 36px; height: 36px; background: rgba(99, 102, 241, 0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent-primary);">
                                    <i class="fas fa-envelope" style="font-size: 14px;"></i>
                                </div>
                                <div>
                                    <p style="color: var(--text-muted); font-size: 11px; font-weight: 600; margin-bottom: 2px;">EMAIL SUPPORT</p>
                                    <p style="font-weight: 600; color: var(--text-main); font-size: 14px;">mukhesh.vasireddy@bhspl.in</p>
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 36px; height: 36px; background: rgba(168, 85, 247, 0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent-secondary);">
                                    <i class="fas fa-globe" style="font-size: 14px;"></i>
                                </div>
                                <div>
                                    <p style="color: var(--text-muted); font-size: 11px; font-weight: 600; margin-bottom: 2px;">WEB PORTAL</p>
                                    <p style="font-weight: 600; color: var(--text-main); font-size: 14px;">www.bhspl.in</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div style="padding: 20px; text-align: center; border-top: 1px solid var(--glass-border); background: #f8fafc;">
                    <p style="margin: 0; color: var(--text-muted); font-size: 12px; font-weight: 500;">
                        Developed with <i class="fas fa-heart" style="color: #ef4444; font-size: 10px;"></i> by <span style="color: var(--text-main); font-weight: 700;">Mukhesh Vasireddy</span>
                    </p>
                    <p style="margin: 5px 0 0; color: var(--text-muted); font-size: 10px; opacity: 0.5;">
                        © 2026 BHSPL. All Rights Reserved.
                    </p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
