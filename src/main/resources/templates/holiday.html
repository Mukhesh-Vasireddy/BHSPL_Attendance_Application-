<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: main-layout(~{::section}, 'Holiday Master', 'leave')}">

<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 20px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--accent-purple); display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-umbrella-beach"></i> Holiday Master
                </h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openHolidayModal()"><i class="fas fa-plus"></i> Add Holiday</button>
                    <form action="/leave/holidays/load-defaults" method="post" style="display: inline;">
                        <button type="submit" class="btn-primary" style="background: #F59E0B;"><i class="fas fa-download"></i> Load Defaults</button>
                    </form>
                    <button class="btn-primary" style="background: #64748B;" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Category Filters -->
        <div style="display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap;">
            <a href="/leave/holidays?type=All" class="badge" style="background: rgba(99, 102, 241, 0.25); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.4); padding: 10px 18px; font-size: 12px; font-weight: 600; text-decoration: none; border-radius: 12px; transition: all 0.3s ease;">All Holidays</a>
            <a href="/leave/holidays?type=National Holiday" class="badge" style="background: rgba(239, 68, 68, 0.35); color: #ff5555; border: 1px solid rgba(239, 68, 68, 0.5); padding: 10px 18px; font-size: 12px; font-weight: 600; text-decoration: none; border-radius: 12px; transition: all 0.3s ease;">National Holiday</a>
            <a href="/leave/holidays?type=Public Holiday" class="badge" style="background: rgba(59, 130, 246, 0.35); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.5); padding: 10px 18px; font-size: 12px; font-weight: 600; text-decoration: none; border-radius: 12px; transition: all 0.3s ease;">Public Holiday</a>
            <a href="/leave/holidays?type=Festival Holiday" class="badge" style="background: rgba(245, 158, 11, 0.35); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.5); padding: 10px 18px; font-size: 12px; font-weight: 600; text-decoration: none; border-radius: 12px; transition: all 0.3s ease;">Festival Holiday</a>
            <a href="/leave/holidays?type=Company Holiday" class="badge" style="background: rgba(16, 185, 129, 0.35); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.5); padding: 10px 18px; font-size: 12px; font-weight: 600; text-decoration: none; border-radius: 12px; transition: all 0.3s ease;">Company Holiday</a>
        </div>
        <style>
            .badge:hover { transform: translateY(-2px); filter: brightness(1.3); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        </style>

        <!-- Data Table -->
        <div class="card" style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Holiday Name</th>
                        <th>Type</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${holidays}" th:data-id="${h['id']}" th:data-date="${h['holiday_date']}" th:data-name="${h['holiday_name']}" th:data-type="${h['holiday_type']}">
                        <td th:text="${h['id']}">1</td>
                        <td th:text="${h['holiday_date']}" style="font-weight: 600; color: var(--text-main);">01-01-2026</td>
                        <td th:text="${h['holiday_name']}">New Year's Day</td>
                        <td>
                            <span th:text="${h['holiday_type']}" 
                                  th:classappend="${h['holiday_type'] == 'National Holiday' ? 'badge-danger' : (h['holiday_type'] == 'Festival Holiday' ? 'badge-warning' : 'badge-primary')}"
                                  class="badge">National Holiday</span>
                        </td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editHoliday(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteHoliday(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(holidays)}">
                        <td colspan="5" style="text-align: center; padding: 40px; color: #94A3B8;">No holidays found. Click 'Load Defaults' to populate common holidays.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Add/Edit Holiday Modal -->
        <div id="holidayModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Add Holiday</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <form action="/leave/holidays/save" method="POST" id="holidayForm" autocomplete="off">
                    <input type="hidden" name="id" id="h_id">
                    <div style="padding: 25px;">
                        <div class="form-group">
                            <label>Holiday Name</label>
                            <input type="text" name="holiday_name" id="h_name" class="form-control" placeholder="e.g. Christmas" required>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" name="holiday_date" id="h_date" class="form-control" required style="color-scheme: dark;">
                            </div>
                            <div class="form-group">
                                <label>Type</label>
                                <select name="holiday_type" id="h_type" class="form-control" required>
                                    <option value="National Holiday">National Holiday</option>
                                    <option value="Festival Holiday">Festival Holiday</option>
                                    <option value="Public Holiday">Public Holiday</option>
                                    <option value="Company Holiday">Company Holiday</option>
                                    <option value="Regional Holiday">Regional Holiday</option>
                                    <option value="Optional Holiday">Optional Holiday</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Holiday</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openHolidayModal() {
                document.getElementById('holidayForm').reset();
                document.getElementById('h_id').value = '';
                document.getElementById('modalTitle').innerText = 'Add Holiday';
                document.getElementById('holidayModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('holidayModal').style.display = 'none';
            }

            function editHoliday(btn) {
                const tr = btn.closest('tr');
                document.getElementById('h_id').value = tr.dataset.id;
                document.getElementById('h_name').value = tr.dataset.name;
                document.getElementById('h_date').value = tr.dataset.date;
                document.getElementById('h_type').value = tr.dataset.type;

                document.getElementById('modalTitle').innerText = 'Edit Holiday';
                document.getElementById('holidayModal').style.display = 'flex';
            }

            function deleteHoliday(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete Holiday', 'Are you sure you want to delete this holiday?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/holidays/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                });
            }
        </script>
    </section>
</body>

</html>
