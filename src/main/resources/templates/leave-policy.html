<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Leave Policy', 'leave')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="policySearch" class="form-control" style="width: 250px;" placeholder="Search leave type..." onkeyup="searchPolicy()">
                    <button class="btn-primary" onclick="searchPolicy()"><i class="fas fa-search"></i> Search</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openPolicyModal()"><i class="fas fa-plus"></i> Add Policy</button>
                    <button class="btn-primary" style="background: #64748B;" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card" style="overflow-x: auto;">
            <table id="policyTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Leave Type</th>
                        <th>Days/Year</th>
                        <th>Credit</th>
                        <th>Carry Fwd</th>
                        <th>Max Carry</th>
                        <th>Expire (mo)</th>
                        <th>Encash</th>
                        <th>Pro-rata</th>
                        <th>Gender</th>
                        <th>Status</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${policies}" th:data-type="${p['leave_type']}" th:data-id="${p['id']}">
                        <td th:text="${p['id']}">1</td>
                        <td th:text="${p['leave_type']}" style="font-weight: 600; color: var(--accent-purple);">Casual Leave</td>
                        <td th:text="${p['days_per_year']}">12</td>
                        <td th:text="${p['credit_method']}">Monthly</td>
                        <td th:text="${#strings.toString(p['carry_forward']) == '1' ? 'Yes' : 'No'}">Yes</td>
                        <td th:text="${p['max_carry']}">10</td>
                        <td th:text="${p['expire_months']}">0</td>
                        <td th:text="${#strings.toString(p['encashable']) == '1' ? 'Yes' : 'No'}">No</td>
                        <td th:text="${#strings.toString(p['pro_rata']) == '1' ? 'Yes' : 'No'}">Yes</td>
                        <td th:text="${p['applicable_gender']}">All</td>
                        <td>
                            <span th:text="${p['status']}" 
                                  th:classappend="${p['status'] == 'Active' ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Active</span>
                        </td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editPolicy(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deletePolicy(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(policies)}">
                        <td colspan="12" style="text-align: center; padding: 40px; color: #94A3B8;">No leave policies defined.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Policy Modal -->
        <div id="policyModal" class="modal">
            <div class="modal-content" style="width: 700px;">
                <div class="modal-header">
                    <h3 id="policyModalTitle">Add Leave Policy</h3>
                    <span class="close" onclick="closePolicyModal()">&times;</span>
                </div>
                <form action="/leave/policy/save" method="POST" id="policyForm" autocomplete="off">
                    <input type="hidden" name="id" id="fieldId">
                    <div style="padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Leave Type Name</label>
                            <input type="text" name="leave_type" id="fieldLeaveType" class="form-control" placeholder="e.g. Casual Leave" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Days Per Year</label>
                            <input type="number" step="0.5" name="days_per_year" id="fieldDays" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Credit Method</label>
                            <select name="credit_method" id="fieldCredit" class="form-control" required>
                                <option>Yearly</option>
                                <option>Monthly</option>
                                <option>Quarterly</option>
                                <option>Manual</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Applicable Gender</label>
                            <select name="applicable_gender" id="fieldGender" class="form-control" required>
                                <option>All</option>
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" id="fieldStatus" class="form-control" required>
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>

                        <div style="grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border);">
                            <div class="form-group" style="margin: 0;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" name="carry_forward" id="fieldCarry" value="1" style="width: 18px; height: 18px;">
                                    Carry Forward
                                </label>
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" name="encashable" id="fieldEncash" value="1" style="width: 18px; height: 18px;">
                                    Encashable
                                </label>
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" name="pro_rata" id="fieldProRata" value="1" style="width: 18px; height: 18px;">
                                    Pro-Rata Basis
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Max Carry Forward</label>
                            <input type="number" step="0.5" name="max_carry" id="fieldMaxCarry" class="form-control" value="0">
                        </div>

                        <div class="form-group">
                            <label>Expiry Months (0=Never)</label>
                            <input type="number" name="expire_months" id="fieldExpire" class="form-control" value="0">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);" onclick="closePolicyModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Policy</button>
                    </div>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            const policies = /*[[${policies}]]*/ [];

            function openPolicyModal() {
                document.getElementById('policyForm').reset();
                document.getElementById('fieldId').value = '';
                document.getElementById('policyModalTitle').innerText = 'Add Leave Policy';
                document.getElementById('policyModal').style.display = 'flex';
            }

            function closePolicyModal() {
                document.getElementById('policyModal').style.display = 'none';
            }

            function editPolicy(btn) {
                const id = btn.closest('tr').dataset.id;
                const p = policies.find(x => x.id == id);
                if (!p) return;

                document.getElementById('fieldId').value = p.id;
                document.getElementById('fieldLeaveType').value = p.leave_type;
                document.getElementById('fieldDays').value = p.days_per_year;
                document.getElementById('fieldCredit').value = p.credit_method;
                document.getElementById('fieldGender').value = p.applicable_gender;
                document.getElementById('fieldStatus').value = p.status;
                document.getElementById('fieldMaxCarry').value = p.max_carry;
                document.getElementById('fieldExpire').value = p.expire_months;
                
                document.getElementById('fieldCarry').checked = String(p.carry_forward) == '1';
                document.getElementById('fieldEncash').checked = String(p.encashable) == '1';
                document.getElementById('fieldProRata').checked = String(p.pro_rata) == '1';

                document.getElementById('policyModalTitle').innerText = 'Edit Leave Policy';
                document.getElementById('policyModal').style.display = 'flex';
            }

            function deletePolicy(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete Policy', 'Are you sure you want to delete the "' + tr.dataset.type + '" policy?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/policy/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                });
            }

            function searchPolicy() {
                const query = document.getElementById('policySearch').value.toLowerCase();
                const rows = document.querySelectorAll('#policyTable tbody tr');
                rows.forEach(row => {
                    const type = row.dataset.type ? row.dataset.type.toLowerCase() : '';
                    if (type.includes(query)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            }
        </script>
    </section>
</body>
</html>
