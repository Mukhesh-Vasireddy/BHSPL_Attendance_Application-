<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Weekly Off', 'masters')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--accent-purple);"><i class="fas fa-calendar-week"></i> Weekly Off</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openOffModal()"><i class="fas fa-plus"></i> Assign Off</button>
                    <button class="btn-primary" style="background: #f1f5f9; color: var(--text-main); border: 1px solid var(--glass-border);" onclick="refreshAndSync()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <form action="/masters/weekly-off" method="get" style="display: flex; gap: 10px; align-items: center;">
                <span style="font-size: 13px; font-weight: 600; color: #64748B;">Dept:</span>
                <select name="dept" class="form-control" style="width: 150px;">
                    <option>All</option>
                    <option th:each="d : ${depts}" th:value="${d.dept_name}" th:text="${d.dept_name}" th:selected="${selDept == d.dept_name}"></option>
                </select>
                <button type="submit" class="btn-primary"><i class="fas fa-filter"></i> Filter</button>
            </form>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table>
                <thead>
                    <tr style="background: #f8fafc;">
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">ID</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Emp ID</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Name</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Dept</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Off Day 1</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Off Day 2</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">From</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">To</th>
                        <th style="padding: 12px 15px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${offs}" th:data-id="${o.id}" th:data-empid="${o.emp_id}" th:data-day1="${o.off_day1}" th:data-day2="${o.off_day2}" th:data-from="${o.effective_from}" th:data-to="${o.effective_to}">
                        <td th:text="${o.id}" style="padding: 12px 15px;">1</td>
                        <td th:text="${o.emp_id}" style="padding: 12px 15px;">101</td>
                        <td th:text="${o.emp_name}" style="padding: 12px 15px; font-weight: 600; color: var(--text-main);">John Doe</td>
                        <td th:text="${o.dept_name}" style="padding: 12px 15px;">Sales</td>
                        <td th:text="${o.off_day1}" style="padding: 12px 15px;">Sunday</td>
                        <td th:text="${o.off_day2}" style="padding: 12px 15px;">None</td>
                        <td th:text="${o.effective_from}" style="padding: 12px 15px;">2026-05-01</td>
                        <td th:text="${o.effective_to}" style="padding: 12px 15px;">2099-12-31</td>
                        <td style="padding: 12px 15px;">
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editOff(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteOff(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/masters/weekly-off')}"></div>
        </div>

        <!-- Off Modal -->
        <div id="offModal" class="modal">
            <div class="modal-content" style="max-width: 450px;">
                <div class="modal-header">
                    <h3 id="modalTitle">Assign Weekly Off</h3>
                    <span class="close" onclick="closeOffModal()">&times;</span>
                </div>
                <form action="/masters/weekly-off/save" method="post" id="offForm">
                    <input type="hidden" name="id" id="fieldId">
                    <div style="padding: 20px;">
                        <div class="form-group">
                            <label>Select Employee *</label>
                            <select name="empId" class="form-control" required>
                                <option th:each="e : ${employees}" th:value="${e.emp_id}" th:text="${e.emp_id + ' - ' + e.emp_name}"></option>
                            </select>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>Off Day 1</label>
                                <select name="day1" class="form-control">
                                    <option>Sunday</option><option>Monday</option><option>Tuesday</option>
                                    <option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Off Day 2</label>
                                <select name="day2" class="form-control">
                                    <option>None</option><option>Sunday</option><option>Monday</option><option>Tuesday</option>
                                    <option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>Effective From</label>
                                <input type="date" name="from" class="form-control" th:value="${#calendars.format(#calendars.createNow(), 'yyyy-MM-dd')}">
                            </div>
                            <div class="form-group">
                                <label>Effective To</label>
                                <input type="date" name="to" class="form-control" value="2099-12-31">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Remarks</label>
                            <input type="text" name="remarks" class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main); border: 1px solid var(--glass-border);" onclick="closeOffModal()">Cancel</button>
                        <button type="submit" class="btn-primary" style="background: #10B981;">Save Assignment</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openOffModal() {
                document.getElementById('offForm').reset();
                document.getElementById('modalTitle').innerText = 'Assign Weekly Off';
                document.getElementById('offModal').style.display = 'flex';
            }
            function closeOffModal() {
                document.getElementById('offModal').style.display = 'none';
            }
            function editOff(btn) {
                const tr = btn.closest('tr');
                document.querySelector('[name="empId"]').value = tr.dataset.empid;
                document.querySelector('[name="day1"]').value = tr.dataset.day1;
                document.querySelector('[name="day2"]').value = tr.dataset.day2;
                document.querySelector('[name="from"]').value = tr.dataset.from;
                document.querySelector('[name="to"]').value = tr.dataset.to;
                
                document.getElementById('modalTitle').innerText = 'Edit Weekly Off';
                document.getElementById('offModal').style.display = 'flex';
            }
            function deleteWeeklyOff(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete Weekly Off', 'Are you sure you want to delete the weekly off setting for ID ' + tr.dataset.empid + '?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/masters/weekly-off/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                });
            }
        </script>
    </section>
</body>
</html>
