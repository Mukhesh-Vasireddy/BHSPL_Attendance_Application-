<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Device Manager', 'devices')}">
<body>
    <section>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Connected Devices</h3>
                <button class="btn-primary"><i class="fas fa-plus"></i> Add Device</button>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div th:each="dev : ${devices}" class="card" style="border: 1px solid #E2E8F0; margin-bottom: 0;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                        <div>
                            <h4 th:text="${dev.device_name}" style="margin: 0; color: var(--accent-purple);">Office Entry</h4>
                            <p th:text="${dev.serial_number}" style="margin: 4px 0; font-size: 12px; color: #64748B;">SN: JJA1253800527</p>
                        </div>
                        <span th:text="${dev.status}" 
                              th:style="${dev.status == 'Active' ? 'background: #DCFCE7; color: #166534' : 'background: #FEE2E2; color: #991B1B'}"
                              style="padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;">Active</span>
                    </div>
                    <div style="font-size: 14px; color: #475569;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span>IP Address:</span>
                            <span th:text="${dev.ip_address + ':' + dev.port}">192.168.1.201:4370</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span>Last Sync:</span>
                            <span th:text="${dev.last_sync}">2026-05-05 17:58</span>
                        </div>
                    </div>
                    <hr style="border: 0; border-top: 1px solid #F1F5F9; margin: 15px 0;">
                    <div style="display: flex; gap: 10px;">
                        <button style="flex: 1; padding: 8px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 6px; cursor: pointer;"><i class="fas fa-sync"></i> Sync</button>
                        <button style="flex: 1; padding: 8px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 6px; cursor: pointer;"><i class="fas fa-cog"></i> Config</button>
                    </div>
                </div>
            </div>
            <div th:if="${devices == null or devices.empty}" style="text-align: center; padding: 40px; color: #64748B;">
                <i class="fas fa-microchip" style="font-size: 48px; margin-bottom: 20px; opacity: 0.3;"></i>
                <p>No devices configured in the system.</p>
            </div>
        </div>
    </section>
</body>
</html>
