<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: main-layout(~{::section}, 'Device Manager', 'devices')}">

<body>
    <section>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 style="color: var(--text-main); font-size: 20px; font-weight: 700;">Connected Devices</h3>
                <button class="btn-primary" onclick="openDeviceModal()"><i class="fas fa-plus"></i> Add Device</button>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
                <div th:each="dev : ${devices}" class="card"
                    style="background: #ffffff; border: 1px solid var(--glass-border); margin: 0; padding: 25px; border-radius: 20px; box-shadow: var(--card-shadow);">
                    <div
                        style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                        <div>
                            <h4 th:text="${dev.device_name}"
                                style="margin: 0; color: var(--text-main); font-size: 18px; font-weight: 700;">Office
                                Entry</h4>
                            <p th:text="${'SN: ' + (dev.serial_number != null ? dev.serial_number : 'Unknown')}"
                                style="margin: 6px 0; font-size: 12px; color: var(--text-muted); font-weight: 500;">SN:
                                JJA1253800527</p>
                        </div>
                        <span th:text="${dev.status}"
                            th:classappend="${dev.status == 'Active' ? 'pill-green' : 'pill-red'}"
                            class="status-pill">Active</span>
                    </div>
                    <div style="font-size: 14px; color: var(--text-main);">
                        <div
                            style="display: flex; justify-content: space-between; margin-bottom: 12px; background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 10px;">
                            <span style="color: var(--text-muted);">IP Address</span>
                            <span th:text="${dev.ip_address + ':' + dev.port}"
                                style="font-weight: 600; color: var(--text-main);">192.168.1.201:4370</span>
                        </div>
                        <div
                            style="display: flex; justify-content: space-between; margin-bottom: 12px; background: #f8fafc; padding: 8px 12px; border-radius: 10px;">
                            <span style="color: var(--text-muted);">Last Sync</span>
                            <span th:text="${dev.last_sync != null ? dev.last_sync : 'Never'}"
                                style="font-weight: 600; color: var(--text-main);">2026-05-05 17:58</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 25px;">
                        <button th:onclick="'window.location.href=\'/system/sync?redirect=/devices\''"
                            style="flex: 1; padding: 12px; background: #f1f5f9; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s;">
                            <i class="fas fa-sync"></i> Sync
                        </button>
                        <button th:onclick="'editDevice(' + ${dev.device_id} + ')'"
                            style="flex: 1; padding: 12px; background: #f1f5f9; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s;">
                            <i class="fas fa-cog"></i> Config
                        </button>
                    </div>
                </div>
            </div>

            <div th:if="${devices == null or devices.empty}"
                style="text-align: center; padding: 60px; color: var(--text-muted);">
                <i class="fas fa-microchip" style="font-size: 64px; margin-bottom: 25px; opacity: 0.1;"></i>
                <p style="font-size: 16px; font-weight: 500;">No devices configured in the system.</p>
            </div>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/devices')}"></div>
        </div>

        <!-- Device Modal -->
        <div id="deviceModal" class="modal">
            <div class="modal-content" style="width: 500px;">
                <div class="modal-header">
                    <h3 id="modalTitle">Add New Device</h3>
                    <span class="close" onclick="closeDeviceModal()">&times;</span>
                </div>

                <form action="/devices/save" method="post" id="deviceForm" style="display: flex; flex-direction: column; height: 100%; overflow: hidden;">
                    <input type="hidden" name="device_id" id="form_device_id" value="0">

                    <div class="modal-body">
                        <div style="display: grid; gap: 25px;">
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Device Name</label>
                                <input type="text" name="device_name" id="form_device_name" class="form-control" required>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 120px; gap: 20px;">
                                <div>
                                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">IP Address</label>
                                    <input type="text" name="ip_address" id="form_ip_address" class="form-control" required placeholder="192.168.1.201">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Port</label>
                                    <input type="number" name="port" id="form_port" class="form-control" value="4370" required>
                                </div>
                            </div>
                            <div>
                                <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Serial Number (Optional)</label>
                                <input type="text" name="serial_number" id="form_serial_number" class="form-control">
                            </div>

                            <div>
                                <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Status</label>
                                <select name="status" id="form_status" class="form-control">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" onclick="deleteCurrentDevice()" id="deleteBtn"
                            style="display: none; padding: 12px 20px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; color: #ef4444; cursor: pointer; font-weight: 600;"><i
                                class="fas fa-trash"></i></button>
                        <div style="flex: 1;"></div>
                        <button type="button" onclick="closeDeviceModal()" class="btn-primary"
                            style="background: #f1f5f9; color: var(--text-main);">Cancel</button>
                        <button type="submit" class="btn-primary">Save Device</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/devices')}"></div>

        <script th:inline="javascript">
            const devices = /*[[${devices}]]*/[];

            function openDeviceModal() {
                document.getElementById('modalTitle').innerText = 'Add New Device';
                document.getElementById('deviceForm').reset();
                document.getElementById('form_device_id').value = '0';
                document.getElementById('deleteBtn').style.display = 'none';
                document.getElementById('deviceModal').style.display = 'flex';
            }

            function closeDeviceModal() {
                document.getElementById('deviceModal').style.display = 'none';
            }

            function editDevice(devId) {
                const dev = devices.find(d => d.device_id == devId);
                if (dev) {
                    document.getElementById('modalTitle').innerText = 'Edit Device';
                    document.getElementById('form_device_id').value = dev.device_id;
                    document.getElementById('form_device_name').value = dev.device_name;
                    document.getElementById('form_ip_address').value = dev.ip_address;
                    document.getElementById('form_port').value = dev.port;
                    document.getElementById('form_serial_number').value = dev.serial_number || '';
                    document.getElementById('form_status').value = dev.status;
                    document.getElementById('deleteBtn').style.display = 'block';
                    document.getElementById('deviceModal').style.display = 'flex';
                }
            }

            function deleteCurrentDevice() {
                const id = document.getElementById('form_device_id').value;
                showConfirm('Delete Device', 'Are you sure you want to delete this device? This will not remove logs already synced.', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/devices/delete';
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'device_id';
                    input.value = id;
                    form.appendChild(input);
                    document.body.appendChild(form);
                    form.submit();
                });
            }
        </script>
    </section>
</body>

</html>
