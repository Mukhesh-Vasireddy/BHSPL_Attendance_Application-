<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Monthly Attendance Matrix', 'reports')}">
<body>
    <section>
        <!-- Filter Header -->
        <div class="card" style="margin-bottom: 20px; padding: 20px;">
            <form action="/reports/monthly" method="get" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Month</label>
                    <select name="month" class="form-control" style="width: 150px;">
                        <option value="01" th:selected="${selMonth == '01' or selMonth == '1'}">January</option>
                        <option value="02" th:selected="${selMonth == '02' or selMonth == '2'}">February</option>
                        <option value="03" th:selected="${selMonth == '03' or selMonth == '3'}">March</option>
                        <option value="04" th:selected="${selMonth == '04' or selMonth == '4'}">April</option>
                        <option value="05" th:selected="${selMonth == '05' or selMonth == '5'}">May</option>
                        <option value="06" th:selected="${selMonth == '06' or selMonth == '6'}">June</option>
                        <option value="07" th:selected="${selMonth == '07' or selMonth == '7'}">July</option>
                        <option value="08" th:selected="${selMonth == '08' or selMonth == '8'}">August</option>
                        <option value="09" th:selected="${selMonth == '09' or selMonth == '9'}">September</option>
                        <option value="10" th:selected="${selMonth == '10'}">October</option>
                        <option value="11" th:selected="${selMonth == '11'}">November</option>
                        <option value="12" th:selected="${selMonth == '12'}">December</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Year</label>
                    <select name="year" class="form-control" style="width: 120px;">
                        <option th:each="y : ${#numbers.sequence(2020, 2030)}" th:value="${y}" th:text="${y}" th:selected="${selYear == #strings.toString(y)}"></option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Department</label>
                    <select name="dept" class="form-control" style="width: 180px;">
                        <option>All</option>
                        <option th:each="d : ${depts}" th:value="${d['dept_name']}" th:text="${d['dept_name']}" th:selected="${selDept == d['dept_name']}"></option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Report Type</label>
                    <select name="type" class="form-control" style="width: 220px;">
                        <option value="PA" th:selected="${selType == 'PA'}">Attendance Summary (P/A)</option>
                        <option value="WH" th:selected="${selType == 'WH'}">Working Hours Summary</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-primary" style="background: var(--accent-primary);"><i class="fas fa-layer-group"></i> Generate Matrix</button>
                    <button type="button" onclick="exportTableToExcel('Monthly_Report.xls')" class="btn-primary" style="background: rgba(16, 185, 129, 0.1); color: #34D399; border: 1px solid rgba(16, 185, 129, 0.2);">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button type="button" onclick="exportTableToCSV('Monthly_Report.csv')" class="btn-primary" style="background: rgba(13, 148, 136, 0.1); color: #2DD4BF; border: 1px solid rgba(13, 148, 136, 0.2);">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                </div>
            </form>
        </div>

        <!-- Matrix Table -->
        <div class="card" style="padding: 0; overflow: hidden; position: relative;">
            <div style="overflow-x: auto;">
                <table class="matrix-table" style="width: 100%; border-collapse: collapse; min-width: 1200px;">
                    <thead style="position: sticky; top: 0; z-index: 10;">
                        <tr>
                            <th class="sticky-col" style="width: 60px;">ID</th>
                            <th class="sticky-col" style="left: 60px; min-width: 180px;">Employee Name</th>
                            <th class="sticky-col" style="left: 240px; min-width: 140px;">Designation</th>
                            <th th:each="d : ${days}" th:text="${d + '/' + (selMonth.startsWith('0') ? selMonth.substring(1) : selMonth) + '/' + selYear}" 
                                style="min-width: 90px;">1/5/2026</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${data}">
                            <td class="sticky-col" th:text="${r['emp_id']}">101</td>
                            <td class="sticky-col" th:text="${r['emp_name']}" style="left: 60px; font-weight: 600; color: var(--text-main);">John Doe</td>
                            <td class="sticky-col" th:text="${r['designation'] ?: '--'}" style="left: 240px;">Developer</td>
                            
                            <td th:each="status : ${r['days']}" 
                                th:text="${status}"
                                th:class="${status == 'P' ? 'cell-p' : (status == 'A' ? 'cell-a' : (status == 'SUN' ? 'cell-sun' : 'cell-holiday'))}">
                                P
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <style>
            .matrix-table th { 
                background: #f8fafc !important; 
                color: var(--text-main) !important; 
                font-size: 11px; 
                font-weight: 700;
                padding: 15px 10px !important;
                border: 1px solid var(--glass-border);
                white-space: nowrap;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                text-align: center;
                vertical-align: middle;
            }
            .matrix-table td { 
                font-size: 11px; 
                padding: 12px 10px !important; 
                border: 1px solid var(--glass-border);
                text-align: center;
                vertical-align: middle;
                color: var(--text-main);
            }
            .matrix-table .sticky-col {
                position: sticky;
                left: 0;
                background: #ffffff;
                z-index: 5;
                border-right: 1px solid var(--glass-border) !important;
                text-align: left !important;
            }
            .matrix-table thead .sticky-col {
                z-index: 15;
                background: #f8fafc !important;
                color: var(--text-main) !important;
            }
            .cell-p { color: #10B981 !important; background: #f0fdf4 !important; }
            .cell-a { color: #EF4444 !important; background: #fef2f2 !important; }
            .cell-sun { color: #3B82F6 !important; background: #eff6ff !important; }
            .cell-holiday { 
                color: #A855F7 !important; 
                background: rgba(168, 85, 247, 0.05) !important; 
                font-size: 9px !important; 
                line-height: 1.1;
                font-weight: 700;
            }
        </style>
    </section>
</body>
</html>
