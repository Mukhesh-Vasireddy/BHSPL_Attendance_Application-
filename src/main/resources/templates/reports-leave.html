<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Leave Report', 'reports')}">
<body>
    <section>
        <!-- Filter Header -->
        <div class="card" style="margin-bottom: 20px; padding: 20px;">
            <form action="/reports/leave" method="get" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
                <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 10}">
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">From Date</label>
                    <input type="date" name="from" th:value="${selFrom}" class="form-control" style="width: 170px;">
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">To Date</label>
                    <input type="date" name="to" th:value="${selTo}" class="form-control" style="width: 170px;">
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Department</label>
                    <select name="dept" class="form-control" style="width: 180px;">
                        <option>All</option>
                        <option th:each="d : ${depts}" th:value="${d['dept_name']}" th:text="${d['dept_name']}" th:selected="${selDept == d['dept_name']}"></option>
                    </select>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button type="submit" class="btn-primary" style="background: var(--accent-primary);"><i class="fas fa-search"></i> Search</button>
                    
                    <!-- Excel Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('Leave_Report.xls')" class="btn-primary" style="background: #10b981; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 10px 15px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;" title="Export ALL records across all pages">
                            <i class="fas fa-database"></i> Full Excel
                        </button>
                        <button type="button" onclick="exportCurrentPage('Leave_Report.xls')" class="btn-primary" style="background: #059669; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 10px 12px; border: none; cursor: pointer; display: flex; align-items: center;" title="Export current page only">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>

                    <!-- CSV Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('Leave_Report.csv')" class="btn-primary" style="background: #0d9488; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 10px 15px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;" title="Export ALL records as CSV">
                            <i class="fas fa-file-csv"></i> Full CSV
                        </button>
                        <button type="button" onclick="exportCurrentPage('Leave_Report.csv')" class="btn-primary" style="background: #0f766e; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 10px 12px; border: none; cursor: pointer; display: flex; align-items: center;" title="Export current page as CSV">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Report Results -->
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="mainDataTable" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f8fafc;">
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Emp ID</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Employee Name</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Leave Type</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">From</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">To</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px; text-align: center;">Days</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px; text-align: center;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${data}" style="border-bottom: 1px solid var(--glass-border);">
                        <td th:text="${r['emp_id']}" style="padding: 15px 20px; font-weight: 500; color: var(--text-muted);">101</td>
                        <td th:text="${r['emp_name']}" style="padding: 15px 20px; font-weight: 600; color: var(--text-main);">John Doe</td>
                        <td th:text="${r['leave_type']}" style="padding: 15px 20px; color: var(--accent-primary); font-weight: 600;">Casual Leave</td>
                        <td th:text="${r['from_date']}" style="padding: 15px 20px; color: var(--text-main);">2026-05-01</td>
                        <td th:text="${r['to_date']}" style="padding: 15px 20px; color: var(--text-main);">2026-05-02</td>
                        <td th:text="${r['days']}" style="padding: 15px 20px; text-align: center; font-weight: 700; color: var(--text-main);">2.0</td>
                        <td style="padding: 15px 20px; text-align: center;">
                            <span class="badge" th:classappend="${r['status'] == 'Approved' ? 'badge-success' : (r['status'] == 'Rejected' ? 'badge-danger' : 'badge-warning')}">
                                <i th:class="${r['status'] == 'Approved' ? 'fas fa-check-circle' : (r['status'] == 'Rejected' ? 'fas fa-times-circle' : 'fas fa-clock')}"></i>
                                <span th:text="${r['status']}">Approved</span>
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(data)}">
                        <td colspan="7" style="padding: 60px; text-align: center; color: #94A3B8;">
                            No leave records found for the selected period.
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/reports/leave')}"></div>
        </div>
    </section>
</body>
</html>
