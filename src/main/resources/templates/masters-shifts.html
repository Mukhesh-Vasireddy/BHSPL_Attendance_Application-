<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Shift Management', 'masters')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--accent-purple);"><i class="fas fa-clock"></i> Shift Management</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openShiftModal()"><i class="fas fa-plus"></i> Add Shift</button>
                    <button class="btn-primary" style="background: #64748B;" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Shift Name</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Break</th>
                        <th>Grace</th>
                        <th>Off Day 1</th>
                        <th>Off Day 2</th>
                        <th>Work Hrs</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${shifts}" th:data-id="${s.id}" th:data-name="${s.shift_name}" th:data-start="${s.start_time}" th:data-end="${s.end_time}" th:data-break="${s.break_mins}" th:data-grace="${s.grace_mins}" th:data-off1="${s.weekly_off1}" th:data-off2="${s.weekly_off2}">
                        <td th:text="${s.id}">1</td>
                        <td th:text="${s.shift_name}" style="font-weight: 600;">General Shift</td>
                        <td th:text="${s.start_time}">09:00:00</td>
                        <td th:text="${s.end_time}">18:00:00</td>
                        <td th:text="${s.break_mins + 'm'}">30m</td>
                        <td th:text="${s.grace_mins + 'm'}">5m</td>
                        <td th:text="${s.weekly_off1}">Sunday</td>
                        <td th:text="${s.weekly_off2}">None</td>
                        <td th:text="${s.work_hours}">8.5</td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editShift(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteShift(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Shift Modal -->
        <div id="shiftModal" class="modal">
            <div class="modal-content" style="max-width: 450px;">
                <div class="modal-header">
                    <h3 id="modalTitle">Create New Shift</h3>
                    <span class="close" onclick="closeShiftModal()">&times;</span>
                </div>
                <form action="/masters/shifts/save" method="post" id="shiftForm">
                    <input type="hidden" name="id" id="fieldId">
                    <div style="padding: 20px;">
                        <div class="form-group">
                            <label>Shift Title *</label>
                            <input type="text" name="name" id="fieldName" class="form-control" placeholder="e.g. Morning Shift" required>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>Start Time</label>
                                <input type="time" name="start" id="fieldStart" class="form-control" value="09:00" required>
                            </div>
                            <div class="form-group">
                                <label>End Time</label>
                                <input type="time" name="end" id="fieldEnd" class="form-control" value="18:00" required>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>Break (min)</label>
                                <input type="number" name="breakM" id="fieldBreak" class="form-control" value="30">
                            </div>
                            <div class="form-group">
                                <label>Grace Period</label>
                                <input type="number" name="grace" id="fieldGrace" class="form-control" value="5">
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>Weekly Off 1</label>
                                <select name="off1" id="fieldOff1" class="form-control">
                                    <option>Sunday</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                                    <option>Thursday</option><option>Friday</option><option>Saturday</option><option>None</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Weekly Off 2</label>
                                <select name="off2" id="fieldOff2" class="form-control">
                                    <option>None</option><option>Sunday</option><option>Monday</option><option>Tuesday</option>
                                    <option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #64748B;" onclick="closeShiftModal()">Cancel</button>
                        <button type="submit" class="btn-primary" style="background: #10B981;">Apply Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openShiftModal() {
                document.getElementById('shiftForm').reset();
                document.getElementById('fieldId').value = '';
                document.getElementById('modalTitle').innerText = 'Create New Shift';
                document.getElementById('shiftModal').style.display = 'flex';
            }

            function closeShiftModal() {
                document.getElementById('shiftModal').style.display = 'none';
            }

            function editShift(btn) {
                const tr = btn.closest('tr');
                document.getElementById('fieldId').value = tr.dataset.id;
                document.getElementById('fieldName').value = tr.dataset.name;
                document.getElementById('fieldStart').value = tr.dataset.start;
                document.getElementById('fieldEnd').value = tr.dataset.end;
                document.getElementById('fieldBreak').value = tr.dataset.break;
                document.getElementById('fieldGrace').value = tr.dataset.grace;
                document.getElementById('fieldOff1').value = tr.dataset.off1;
                document.getElementById('fieldOff2').value = tr.dataset.off2;
                
                document.getElementById('modalTitle').innerText = 'Modify Shift Settings';
                document.getElementById('shiftModal').style.display = 'flex';
            }

            function deleteShift(btn) {
                const tr = btn.closest('tr');
                if (confirm('Delete shift ' + tr.dataset.name + '?')) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/masters/shifts/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                }
            }
        </script>
    </section>
</body>
</html>
