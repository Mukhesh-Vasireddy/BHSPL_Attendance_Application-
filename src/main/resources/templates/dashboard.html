<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main-layout(~{::section}, 'Dashboard', 'dashboard')}">

<body>
    <section>
        <div class="stats-grid">
            <div class="stat-card present" onclick="window.location.href='/attendance?status=Present'">
                <div class="stat-info">
                    <h3 th:text="${presentCount}">28</h3>
                    <p>Today Present</p>
                </div>
                <div class="stat-icon"><i class="fas fa-user-check"></i></div>
            </div>
            <div class="stat-card absent" onclick="window.location.href='/attendance?status=Absent'">
                <div class="stat-info">
                    <h3 th:text="${absentCount}">19</h3>
                    <p>Today Absents</p>
                </div>
                <div class="stat-icon"><i class="fas fa-user-slash"></i></div>
            </div>
            <div class="stat-card total" onclick="window.location.href='/employees'">
                <div class="stat-info">
                    <h3 th:text="${totalEmps}">47</h3>
                    <p>Total Employees</p>
                </div>
                <div class="stat-icon"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-card leave" onclick="window.location.href='/leave/manager'">
                <div class="stat-info">
                    <h3 th:text="${leaveCount}">0</h3>
                    <p>On Leave Today</p>
                </div>
                <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
            </div>
        </div>

        <style>
            .weekly-table {
                width: 100%;
                border-collapse: collapse;
            }
            .weekly-table th {
                background: rgba(255, 255, 255, 0.02);
                color: var(--text-muted);
                font-weight: 600;
                font-size: 13px;
                padding: 18px 25px;
                text-align: left;
                border-bottom: 1px solid var(--glass-border);
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .weekly-table td {
                padding: 18px 25px;
                border-bottom: 1px solid var(--glass-border);
                color: var(--text-main);
                font-size: 14px;
                vertical-align: middle;
                transition: background 0.2s;
            }
            .weekly-table tbody tr:hover td {
                background: rgba(255, 255, 255, 0.02);
            }
            .emp-info {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .emp-avatar {
                width: 40px;
                height: 40px;
                border-radius: 12px;
                background: rgba(99, 102, 241, 0.1);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                color: var(--accent-primary);
                font-size: 16px;
                border: 1px solid rgba(99, 102, 241, 0.2);
            }
            .emp-details {
                display: flex;
                flex-direction: column;
            }
            .emp-name {
                font-weight: 600;
                color: var(--text-main);
            }
            .emp-dept {
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 2px;
            }
            .day-number {
                font-size: 13px;
                color: var(--text-main);
                font-weight: 500;
            }
            .view-select {
                background: #ffffff;
                color: var(--text-main);
                border: 1px solid #e2e8f0;
                border-radius: 12px;
                padding: 10px 15px;
                outline: none;
                cursor: pointer;
                font-weight: 500;
                font-size: 13px;
                transition: all 0.3s;
            }
            .view-select:focus {
                border-color: var(--accent-primary);
                box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            }
        </style>

        <div class="table-container">
            <div class="table-header">
                <h3>Attendance Overview</h3>
                <div style="display:flex; gap:12px;">
                    <select id="view-toggle" class="view-select">
                        <option value="today">Today's Detailed View</option>
                        <option value="weekly">Weekly Variance Grid</option>
                    </select>
                    <button class="refresh-btn"><i class="fas fa-filter"></i> Filter</button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table class="weekly-table" id="variance-table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            
                            <!-- Today Mode Headers -->
                            <th class="col-today">In Time</th>
                            <th class="col-today">Punches</th>
                            <th class="col-today">Status</th>

                            <!-- Weekly Mode Headers -->
                            <th class="col-weekly" style="display:none;" 
                                th:each="day : ${weekDays}" th:text="${day}">Day</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${recentLogs}">
                            <td>
                                <div class="emp-info">
                                    <div class="emp-avatar" th:text="${#strings.substring(log.emp_name,0,1)}">E</div>
                                    <div class="emp-details">
                                        <span class="emp-name" th:text="${log.emp_name}">Name</span>
                                        <span class="emp-dept" th:text="${log.emp_id}">ID</span>
                                    </div>
                                </div>
                            </td>
                            
                            <!-- Today Mode Data -->
                            <td class="col-today">
                                <span class="day-number" th:text="${#temporals.format(log.in_time, 'hh:mm a')}">09:00 AM</span>
                            </td>
                            <td class="col-today">
                                <span class="day-number" style="font-weight:700;" th:text="${log.punches}">1</span>
                            </td>
                            <td class="col-today">
                                <span th:if="${#temporals.hour(log.in_time) < 10}" class="status-pill pill-green">
                                    <i class="fas fa-check-circle"></i> On Time
                                </span>
                                <span th:if="${#temporals.hour(log.in_time) >= 10}" class="status-pill pill-orange">
                                    <i class="far fa-clock"></i> Late Entry
                                </span>
                            </td>

                            <!-- Weekly Mode Data -->
                            <td class="col-weekly" style="display:none;" 
                                th:each="dateStr : ${weekDates}">
                                <span th:if="${weeklyData.get(log.emp_id)?.get(dateStr) == 'P'}" class="status-pill pill-green">
                                    <i class="fas fa-check"></i> P
                                </span>
                                <span th:unless="${weeklyData.get(log.emp_id)?.get(dateStr) == 'P'}" class="status-pill pill-red" style="opacity: 0.3;">
                                    -
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${recentLogs == null or recentLogs.empty}">
                            <td colspan="8" style="text-align: center; padding: 60px; color: var(--text-muted);">
                                No attendance records found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination Section -->
            <div class="pagination-container" style="display: flex; align-items: center; justify-content: space-between; padding: 25px; border-top: 1px solid var(--glass-border); background: #f8fafc;">
                <div style="color: var(--text-muted); font-size: 13px;">
                    Showing page <span th:text="${currentPage}" style="color: var(--text-main); font-weight: 700;">1</span> of <span th:text="${totalPages}" style="color: var(--text-main); font-weight: 700;">1</span>
                </div>
                <div style="display: flex; gap: 12px;">
                    <a th:if="${currentPage > 1}" th:href="@{/(page=${currentPage - 1})}" class="btn-primary" style="padding: 8px 16px; font-size: 13px; text-decoration: none;">
                        <i class="fas fa-chevron-left"></i> Previous
                    </a>
                    <a th:if="${currentPage < totalPages}" th:href="@{/(page=${currentPage + 1})}" class="btn-primary" style="padding: 8px 16px; font-size: 13px; text-decoration: none;">
                        Next <i class="fas fa-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>

        <script>
            const viewToggle = document.getElementById('view-toggle');
            const varianceTable = document.getElementById('variance-table');

            function updateView(view) {
                const weeklyCols = document.querySelectorAll('.col-weekly');
                const todayCols = document.querySelectorAll('.col-today');
                
                if(view === 'weekly') {
                    weeklyCols.forEach(col => col.style.display = 'table-cell');
                    todayCols.forEach(col => col.style.display = 'none');
                } else {
                    weeklyCols.forEach(col => col.style.display = 'none');
                    todayCols.forEach(col => col.style.display = 'table-cell');
                }
                localStorage.setItem('dashboard-view-mode', view);
            }

            viewToggle.addEventListener('change', function(e) {
                updateView(e.target.value);
            });

            // Restore view mode from localStorage
            const savedView = localStorage.getItem('dashboard-view-mode') || 'today';
            viewToggle.value = savedView;
            updateView(savedView);
        </script>
    </section>
</body>

</html>
