<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: main-layout(~{::section}, 'Leave Requests', 'leave')}">

<body>
    <section>
        <!-- Statistics Header -->
        <div
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="card"
                style="padding: 25px; display: flex; align-items: center; gap: 20px; border-left: 4px solid #0284c7;">
                <div
                    style="background: rgba(2, 132, 199, 0.1); color: #0284c7; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <h3 style="margin: 0; font-size: 24px; color: var(--text-main);" th:text="${pendingCount}">0</h3>
                    <p
                        style="margin: 0; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">
                        Pending Requests</p>
                </div>
            </div>
            <div class="card"
                style="padding: 25px; display: flex; align-items: center; gap: 20px; border-left: 4px solid #10b981;">
                <div
                    style="background: rgba(16, 185, 129, 0.1); color: #10b981; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                    <i class="fas fa-check-double"></i>
                </div>
                <div>
                    <h3 style="margin: 0; font-size: 24px; color: var(--text-main);" th:text="${approvedToday}">0</h3>
                    <p
                        style="margin: 0; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">
                        Approved Today</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div
                style="padding: 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; color: var(--text-main); font-size: 18px;">Pending Approval Queue</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <!-- Excel Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('Leave_Requests.xls')" class="btn-primary" style="background: #10b981; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 10px 15px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;" title="Export ALL records across all pages">
                            <i class="fas fa-database"></i> Full Excel
                        </button>
                        <button type="button" onclick="exportCurrentPage('Leave_Requests.xls')" class="btn-primary" style="background: #059669; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 10px 12px; border: none; cursor: pointer; display: flex; align-items: center;" title="Export current page only">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>
                    <button type="button" class="btn-primary" style="background: rgba(13, 148, 136, 0.1); color: #2DD4BF; border: 1px solid rgba(13, 148, 136, 0.2); border-radius: 12px; font-size: 13px; padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="exportTableToCSV('Leave_Requests.csv')">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button class="btn-primary" onclick="refreshAndSync()"
                        style="background: #f1f5f9; color: var(--text-main);">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="mainDataTable" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 1px solid var(--glass-border);">
                            <th
                                style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Employee</th>
                            <th
                                style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Leave Type</th>
                            <th
                                style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Duration</th>
                            <th
                                style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Reason</th>
                            <th
                                style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; width: 300px;">
                                Decision</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="l : ${leaves}" th:if="${l['status'] == 'Pending'}" th:data-id="${l['id']}"
                            style="border-bottom: 1px solid var(--glass-border); transition: all 0.2s;"
                            onmouseover="this.style.background='rgba(255,255,255,0.02)'"
                            onmouseout="this.style.background='none'">
                            <td style="padding: 18px 25px;">
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <span style="color: var(--text-main); font-weight: 600; font-size: 14px;"
                                        th:text="${l['emp_name']}">Employee Name</span>
                                    <span style="color: var(--accent-primary); font-size: 12px;"
                                        th:text="${'ID: ' + l['emp_id']}">ID: 101</span>
                                </div>
                            </td>
                            <td style="padding: 18px 25px;">
                                <span class="badge"
                                    style="background: rgba(2, 132, 199, 0.1); color: #0284c7; border: 1px solid rgba(2, 132, 199, 0.2);"
                                    th:text="${l['leave_type']}">Casual Leave</span>
                            </td>
                            <td style="padding: 18px 25px;">
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <span style="color: var(--text-main); font-size: 13px;"
                                        th:text="${l['from_date'] + ' to ' + l['to_date']}">2026-05-01 to
                                        2026-05-02</span>
                                    <span style="color: var(--text-muted); font-size: 11px;"
                                        th:text="${l['days'] + ' Days'}">2 Days</span>
                                </div>
                            </td>
                            <td style="padding: 18px 25px;">
                                <div style="max-width: 200px; color: var(--text-muted); font-size: 13px; line-height: 1.4;"
                                    th:text="${l['reason']}">No reason provided</div>
                            </td>
                            <td style="padding: 18px 25px;">
                                <div style="display: flex; flex-direction: column; gap: 12px;">
                                    <!-- Primary Buttons -->
                                    <div class="primary-actions" style="display: flex; gap: 10px;">
                                        <button class="btn-primary"
                                            style="flex: 1; background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); font-size: 12px; padding: 10px; border-radius: 8px;"
                                            onclick="toggleDecision(this, 'approve')">
                                            <i class="fas fa-check"></i> Approve
                                        </button>
                                        <button class="btn-primary"
                                            style="flex: 1; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 12px; padding: 10px; border-radius: 8px;"
                                            onclick="toggleDecision(this, 'reject')">
                                            <i class="fas fa-times"></i> Reject
                                        </button>
                                    </div>

                                    <!-- Approval Box -->
                                    <div class="decision-box approve-box"
                                        style="display: none; background: #f0fdf4; padding: 12px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.2);">
                                        <div style="display: flex; gap: 8px;">
                                            <input type="text" class="approve-comment"
                                                placeholder="Approval note (optional)..."
                                                style="flex: 1; background: #ffffff; border: 1px solid #10b981; border-radius: 8px; padding: 8px; color: var(--text-main); font-size: 12px; outline: none;">
                                            <button onclick="submitDecision(this, 'Approved')"
                                                style="background: #10b981; border: none; border-radius: 8px; width: 36px; color: white; cursor: pointer;"><i
                                                    class="fas fa-paper-plane"></i></button>
                                        </div>
                                        <p style="margin: 5px 0 0; font-size: 10px; color: #10b981; opacity: 0.8;">
                                            Confirming Approval</p>
                                    </div>

                                    <!-- Rejection Box -->
                                    <div class="decision-box reject-box"
                                        style="display: none; background: #fef2f2; padding: 12px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2);">
                                        <div style="display: flex; gap: 8px;">
                                            <input type="text" class="reject-comment"
                                                placeholder="Reason for rejection..."
                                                style="flex: 1; background: #ffffff; border: 1px solid #ef4444; border-radius: 8px; padding: 8px; color: var(--text-main); font-size: 12px; outline: none;">
                                            <button onclick="submitDecision(this, 'Rejected')"
                                                style="background: #ef4444; border: none; border-radius: 8px; width: 36px; color: white; cursor: pointer;"><i
                                                    class="fas fa-paper-plane"></i></button>
                                        </div>
                                        <p style="margin: 5px 0 0; font-size: 10px; color: #ef4444; opacity: 0.8;">
                                            Confirming Rejection</p>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(leaves)}">
                            <td colspan="5" style="padding: 60px; text-align: center;">
                                <div
                                    style="color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 15px;">
                                    <i class="fas fa-check-circle" style="font-size: 48px; opacity: 0.2;"></i>
                                    <span>All leave requests have been processed!</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/leave/requests')}"></div>
        </div>

        <script>
            function toggleDecision(btn, type) {
                const row = btn.closest('tr');
                const appBox = row.querySelector('.approve-box');
                const rejBox = row.querySelector('.reject-box');

                if (type === 'approve') {
                    rejBox.style.display = 'none';
                    appBox.style.display = appBox.style.display === 'none' ? 'block' : 'none';
                    if (appBox.style.display === 'block') appBox.querySelector('input').focus();
                } else {
                    appBox.style.display = 'none';
                    rejBox.style.display = rejBox.style.display === 'none' ? 'block' : 'none';
                    if (rejBox.style.display === 'block') rejBox.querySelector('input').focus();
                }
            }

            function submitDecision(btn, status) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                let comment = '';

                if (status === 'Approved') {
                    comment = tr.querySelector('.approve-comment').value;
                    showConfirm('Approve Leave', 'Are you sure you want to approve this leave request?', () => {
                        executeSubmit(id, status, comment);
                    });
                } else {
                    comment = tr.querySelector('.reject-comment').value;
                    if (!comment.trim()) {
                        showAlert('Comment Required', 'Please provide a reason for rejection.');
                        return;
                    }
                    showConfirm('Reject Leave', 'Are you sure you want to reject this leave request?', () => {
                        executeSubmit(id, status, comment);
                    });
                }
            }

            function executeSubmit(id, status, comment) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/leave/requests/process';
                form.style.display = 'none';

                const fields = { id, status, comment };
                for (const [name, value] of Object.entries(fields)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = name;
                    input.value = value;
                    form.appendChild(input);
                }

                document.body.appendChild(form);
                form.submit();
            }
        </script>
    </section>
</body>

</html>
