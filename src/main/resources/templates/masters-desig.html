<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Designation Master', 'masters')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="btn-primary" style="background: #10B981;" onclick="openDesigModal()"><i class="fas fa-plus"></i> Add New Designation</button>
                    <button class="btn-primary" style="background: #f1f5f9; color: var(--text-main); border: 1px solid var(--glass-border);" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <!-- ... -->
            </div>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table>
                <thead>
                    <tr style="background: #f8fafc;">
                        <th style="padding: 15px 20px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; width: 60px;">ID</th>
                        <th style="padding: 15px 20px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Designation Name</th>
                        <th style="padding: 15px 20px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; width: 100px;">Level</th>
                        <th style="padding: 15px 20px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Description</th>
                        <th style="padding: 15px 20px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; width: 120px;">Status</th>
                        <th style="padding: 15px 20px; color: var(--text-main); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; width: 100px; text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${designations}" th:data-id="${d.id}" th:data-name="${d.desig_name}" th:data-level="${d.level_order}" th:data-desc="${d.description}" th:data-status="${d.status}">
                        <td th:text="${d.id}" style="padding: 15px 20px;">1</td>
                        <td th:text="${d.desig_name}" style="padding: 15px 20px; font-weight: 600; color: var(--text-main);">Software Engineer</td>
                        <td th:text="${d.level_order}" style="padding: 15px 20px; text-align: center;">1</td>
                        <td th:text="${d.description}" style="padding: 15px 20px;">Core development role</td>
                        <td style="padding: 15px 20px;">
                            <span th:text="${d.status}" 
                                  th:classappend="${d.status == 'Active' ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Active</span>
                        </td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" onclick="editDesig(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteDesig(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Desig Modal -->
        <div id="desigModal" class="modal">
            <div class="modal-content" style="max-width: 450px;">
                <div class="modal-header">
                    <h3 id="modalTitle">Add New Designation</h3>
                    <span class="close" onclick="closeDesigModal()">&times;</span>
                </div>
                <form action="/masters/designations/save" method="post" id="desigForm">
                    <input type="hidden" name="id" id="fieldId">
                    <div style="padding: 20px;">
                        <div class="form-group">
                            <label>Designation Name *</label>
                            <input type="text" name="name" id="fieldName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Level Order (1-99)</label>
                            <input type="number" name="level" id="fieldLevel" class="form-control" value="1">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" id="fieldDesc" class="form-control" style="height: 60px;"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" id="fieldStatus" class="form-control">
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-primary" style="background: #f1f5f9; color: var(--text-main); border: 1px solid var(--glass-border);" onclick="closeDesigModal()">Cancel</button>
                        <button type="submit" class="btn-primary" style="background: #10B981;">Save Designation</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openDesigModal() {
                document.getElementById('desigForm').reset();
                document.getElementById('fieldId').value = '';
                document.getElementById('modalTitle').innerText = 'Add New Designation';
                document.getElementById('desigModal').style.display = 'flex';
            }

            function closeDesigModal() {
                document.getElementById('desigModal').style.display = 'none';
            }

            function editDesig(btn) {
                const tr = btn.closest('tr');
                document.getElementById('fieldId').value = tr.dataset.id;
                document.getElementById('fieldName').value = tr.dataset.name;
                document.getElementById('fieldLevel').value = tr.dataset.level;
                document.getElementById('fieldDesc').value = tr.dataset.desc;
                document.getElementById('fieldStatus').value = tr.dataset.status;
                
                document.getElementById('modalTitle').innerText = 'Edit Designation';
                document.getElementById('desigModal').style.display = 'flex';
            }

            function deleteDesig(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete Designation', 'Delete designation ' + tr.dataset.name + '?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/masters/designations/delete';
                    const idInput = document.createElement('input'); idInput.name = 'id'; idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form); form.submit();
                });
            }
        </script>
    </section>
</body>
</html>
