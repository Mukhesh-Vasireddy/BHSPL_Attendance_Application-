<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Leave Manager', 'leave')}">
<body>
    <section>
        <!-- Modern Page Header -->
        <div class="module-header">
            <div>
                <h1 class="module-title">Leave Directory</h1>
                <div class="module-sub">Submit and manage employee leaves, balances, and request approvals</div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button class="btn-primary" onclick="openLeaveModal()"><i class="fas fa-plus"></i> Apply Leave</button>
                <button class="btn-primary btn-outline" onclick="refreshAndSync()"><i class="fas fa-sync"></i> Refresh</button>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                <span style="font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Filter Status:</span>
                <select id="statusFilter" onchange="filterTable()" class="form-control" style="width: 180px; padding: 8px 12px; margin: 0;">
                    <option>All</option>
                    <option>Pending</option>
                    <option>Approved</option>
                    <option>Rejected</option>
                </select>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card" style="padding: 0; overflow: hidden;">
            <div style="overflow-x: auto;">
                <table id="leaveTable" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Leave Type</th>
                            <th>Date Range</th>
                            <th>Days</th>
                            <th>Status</th>
                            <th>Applied On</th>
                            <th>Manager Comment</th>
                            <th style="width: 100px; text-align: center;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="leaveTableBody">
                        <tr th:each="l : ${leaves}" th:data-status="${l['status']}" th:data-id="${l['id']}" 
                            th:data-empname="${l['emp_name']}" th:data-empid="${l['emp_id']}" th:data-type="${l['leave_type']}" th:data-from="${l['from_date']}" 
                            th:data-to="${l['to_date']}" th:data-days="${l['days']}" th:data-reason="${l['reason']}"
                            style="border-bottom: 1px solid var(--glass-border); transition: background 0.2s;">
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="tbl-avatar" th:text="${l['emp_name'] != null && !l['emp_name'].isEmpty() ? #strings.substring(l['emp_name'], 0, 1) : 'E'}">E</div>
                                    <div style="display: flex; flex-direction: column;">
                                        <span style="color: var(--text-main); font-weight: 700;" th:text="${l['emp_name']}">Employee Name</span>
                                        <span style="color: var(--text-muted); font-size: 11px;" th:text="${'ID: ' + l['emp_id']}">ID: 101</span>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${l['leave_type']}">Casual</td>
                            <td th:text="${l['from_date'] + ' to ' + l['to_date']}">2026-05-01</td>
                            <td style="font-weight: 700;" th:text="${l['days']}">1</td>
                            <td>
                                <span class="badge" th:classappend="${l['status'] == 'Approved' ? 'badge-success' : (l['status'] == 'Rejected' ? 'badge-danger' : 'badge-warning')}" 
                                      th:text="${l['status']}">Pending</span>
                            </td>
                            <td th:text="${l['applied_on'] != null ? l['applied_on'].toString().split(' ')[0] : '—'}">2026-05-05</td>
                            <td style="color: #94A3B8; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${l['reject_reason'] ?: '—'}" th:title="${l['reject_reason']}">—</td>
                            <td style="text-align: center;">
                                <div class="action-col" style="justify-content: center;">
                                    <button class="action-btn edit" title="Edit" onclick="editLeave(this)"><i class="fas fa-pen"></i></button>
                                    <button class="action-btn delete" title="Delete" onclick="deleteLeave(this)"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(leaves)}">
                            <td colspan="8">
                                <div class="empty-state">
                                    <i class="fas fa-calendar-times"></i>
                                    <p>No leave applications found.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/leave/manager')}"></div>
        </div>

        <!-- Apply Leave Modal -->
        <div id="leaveModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Apply Leave Request</h3>
                    <span class="close" onclick="closeLeaveModal()">&times;</span>
                </div>
                
                <form action="/leave/save" method="post" id="leaveForm" autocomplete="off">
                    <input type="hidden" name="id" id="fieldId">
                    <input type="hidden" name="status" id="fieldStatus" value="Pending">
                    
                    <div style="padding: 25px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label>Employee Name <span style="color: #ef4444;">*</span></label>
                                <input type="text" name="empName" id="fieldEmpName" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Employee ID</label>
                                <input type="text" name="empId" id="fieldEmpId" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Leave Type</label>
                                <select name="type" id="fieldType" class="form-control" required>
                                    <option th:each="t : ${leaveTypes}" th:value="${t.leave_type}" th:text="${t.leave_type}">Casual Leave</option>
                                </select>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr 80px; gap: 20px;">
                            <div class="form-group">
                                <label>From Date</label>
                                <input type="date" name="from" id="fieldFrom" class="form-control" required 
                                       oninput="handleDateChange()" max="9999-12-31" style="color-scheme: light;">
                            </div>
                            <div class="form-group">
                                <label>To Date</label>
                                <input type="date" name="to" id="fieldTo" class="form-control" required 
                                       oninput="calcDays()" max="9999-12-31" style="color-scheme: light;">
                            </div>
                            <div class="form-group">
                                <label>Days</label>
                                <input type="number" name="days" id="fieldDays" class="form-control" readonly style="color: var(--accent-primary); font-weight: 700; background: #f8fafc;">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Reason <span style="color: #ef4444;">*</span></label>
                            <textarea name="reason" id="fieldReason" class="form-control" rows="3" style="resize: none;" required></textarea>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" onclick="closeLeaveModal()" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);">Cancel</button>
                        <button type="submit" class="btn-primary">Submit Application</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            // Form submission validation
            document.getElementById('leaveForm').onsubmit = function(e) {
                const f = document.getElementById('fieldFrom').value;
                const t = document.getElementById('fieldTo').value;
                if (f && t && new Date(t) < new Date(f)) {
                    showAlert('Invalid Date Range', 'To Date cannot be earlier than From Date.');
                    e.preventDefault();
                    return false;
                }
                return true;
            };

            function filterTable() {
                const status = document.getElementById('statusFilter').value;
                const rows = document.querySelectorAll('#leaveTable tbody tr');
                rows.forEach(row => {
                    if (status === 'All' || row.dataset.status === status) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            }

            function openLeaveModal() {
                const form = document.getElementById('leaveForm');
                form.reset();
                document.getElementById('fieldId').value = '';
                document.getElementById('fieldStatus').value = 'Pending';
                document.getElementById('modalTitle').innerText = 'Apply Leave Request';
                document.getElementById('fieldTo').removeAttribute('min');
                document.getElementById('fieldTo').value = '';
                document.getElementById('fieldDays').value = '';
                document.getElementById('leaveModal').style.display = 'flex';
            }

            function closeLeaveModal() {
                document.getElementById('leaveModal').style.display = 'none';
            }

            function handleDateChange() {
                const fromInput = document.getElementById('fieldFrom');
                const toInput = document.getElementById('fieldTo');
                
                // Truncate year if more than 4 digits
                if (fromInput.value && fromInput.value.split('-')[0].length > 4) {
                    fromInput.value = fromInput.value.split('-')[0].substring(0, 4) + fromInput.value.substring(fromInput.value.indexOf('-'));
                }

                if (fromInput.value) {
                    toInput.min = fromInput.value;
                } else {
                    toInput.removeAttribute('min');
                }
                calcDays();
            }

            function calcDays() {
                const fInput = document.getElementById('fieldFrom');
                const tInput = document.getElementById('fieldTo');
                const daysInput = document.getElementById('fieldDays');
                
                const f = fInput.value;
                const t = tInput.value;
                
                // Truncate year if more than 4 digits
                if (tInput.value && tInput.value.split('-')[0].length > 4) {
                    tInput.value = tInput.value.split('-')[0].substring(0, 4) + tInput.value.substring(tInput.value.indexOf('-'));
                }

                tInput.setCustomValidity("");
                
                if (f && t) {
                    const start = new Date(f);
                    const end = new Date(t);
                    if (end >= start) {
                        const diffTime = Math.abs(end - start);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                        daysInput.value = diffDays;
                    } else {
                        daysInput.value = '';
                        tInput.setCustomValidity("To Date cannot be before From Date");
                    }
                } else {
                    daysInput.value = '';
                }
            }

            function editLeave(btn) {
                const tr = btn.closest('tr');
                document.getElementById('fieldId').value = tr.dataset.id;
                document.getElementById('fieldEmpName').value = tr.dataset.empname || '';
                document.getElementById('fieldEmpId').value = tr.dataset.empid;
                document.getElementById('fieldType').value = tr.dataset.type;
                document.getElementById('fieldFrom').value = tr.dataset.from;
                document.getElementById('fieldTo').value = tr.dataset.to;
                document.getElementById('fieldDays').value = tr.dataset.days;
                document.getElementById('fieldReason').value = tr.dataset.reason || '';
                document.getElementById('fieldStatus').value = tr.dataset.status;
                
                handleDateChange();
                
                document.getElementById('modalTitle').innerText = 'Edit Leave Request';
                document.getElementById('leaveModal').style.display = 'flex';
            }

            function deleteLeave(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete Request', 'Are you sure you want to delete this leave request?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/delete';
                    form.style.display = 'none';
                    const idInput = document.createElement('input');
                    idInput.type = 'hidden';
                    idInput.name = 'id';
                    idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form);
                    form.submit();
                });
            }
        </script>
    </section>
</body>
</html>
