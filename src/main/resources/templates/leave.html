<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Leave Manager', 'leave')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 25px; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px;">Filter Status:</span>
                    <select id="statusFilter" onchange="filterTable()" style="width: 160px;">
                        <option>All</option>
                        <option>Pending</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn-primary" onclick="openLeaveModal()"><i class="fas fa-plus"></i> Apply Leave</button>
                    <button class="btn-primary" style="background: #f1f5f9; border: 1px solid var(--glass-border); color: var(--text-main);" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card" style="padding: 0; overflow: hidden;">
            <table id="leaveTable">
                <thead>
                    <tr style="border-bottom: 1px solid var(--glass-border);">
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">ID</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Employee</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Leave Type</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Date Range</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Days</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Status</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Applied On</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Manager Comment</th>
                        <th style="padding: 18px 25px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody id="leaveTableBody">
                    <tr th:each="l : ${leaves}" th:data-status="${l['status']}" th:data-id="${l['id']}" 
                        th:data-empid="${l['emp_id']}" th:data-type="${l['leave_type']}" th:data-from="${l['from_date']}" 
                        th:data-to="${l['to_date']}" th:data-days="${l['days']}" th:data-reason="${l['reason']}"
                        style="border-bottom: 1px solid var(--glass-border); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='none'">
                        <td style="padding: 18px 25px; color: var(--text-main); font-weight: 500;" th:text="${l['id']}">1</td>
                        <td style="padding: 18px 25px;">
                            <div style="display: flex; flex-direction: column; gap: 4px;">
                                <span style="color: var(--text-main); font-weight: 600; font-size: 14px;" th:text="${l['emp_name']}">Employee Name</span>
                                <span style="color: var(--accent-primary); font-size: 12px;" th:text="${'ID: ' + l['emp_id']}">ID: 101</span>
                            </div>
                        </td>
                        <td style="padding: 18px 25px; color: var(--text-main); font-size: 13px;" th:text="${l['leave_type']}">Casual</td>
                        <td style="padding: 18px 25px; color: var(--text-main); font-size: 13px;" th:text="${l['from_date'] + ' to ' + l['to_date']}">2026-05-01</td>
                        <td style="padding: 18px 25px; color: var(--text-main); font-size: 13px; font-weight: 600;" th:text="${l['days']}">1</td>
                        <td style="padding: 18px 25px;">
                            <span th:class="'badge ' + ${l['status'] == 'Approved' ? 'badge-success' : (l['status'] == 'Rejected' ? 'badge-danger' : 'badge-warning')}" 
                                  th:text="${l['status']}">Pending</span>
                        </td>
                        <td style="padding: 18px 25px; font-size: 13px; color: var(--text-muted);" th:text="${l['applied_on'] != null ? l['applied_on'].toString().split(' ')[0] : '—'}">2026-05-05</td>
                        <td style="padding: 18px 25px; font-size: 13px; color: #94A3B8; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${l['reject_reason'] ?: '—'}" th:title="${l['reject_reason']}">—</td>
                        <td style="padding: 18px 25px;">
                            <div class="action-col" style="justify-content: center;">
                                <button class="action-btn edit" title="Edit" onclick="editLeave(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteLeave(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${leaves == null or leaves.empty}" style="text-align: center; padding: 60px; color: var(--text-muted);">
                <i class="fas fa-calendar-times" style="font-size: 64px; margin-bottom: 25px; opacity: 0.1;"></i>
                <p style="font-size: 16px; font-weight: 500;">No leave applications found.</p>
            </div>
        </div>

        <!-- Apply Leave Modal -->
        <div id="leaveModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Apply Leave Request</h3>
                    <span class="close" onclick="closeLeaveModal()">&times;</span>
                </div>
                
                <form action="/leave/save" method="post" id="leaveForm" autocomplete="off">
                    <input type="hidden" name="id" id="fieldId">
                    <input type="hidden" name="status" id="fieldStatus" value="Pending">
                    
                    <div style="padding: 25px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label>Employee ID</label>
                                <input type="text" name="empId" id="fieldEmpId" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Leave Type</label>
                                <select name="type" id="fieldType" class="form-control" required>
                                    <option th:each="t : ${leaveTypes}" th:value="${t.leave_type}" th:text="${t.leave_type}">Casual Leave</option>
                                </select>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr 80px; gap: 20px;">
                            <div class="form-group">
                                <label>From Date</label>
                                <input type="date" name="from" id="fieldFrom" class="form-control" required onchange="calcDays()" style="color-scheme: light;">
                            </div>
                            <div class="form-group">
                                <label>To Date</label>
                                <input type="date" name="to" id="fieldTo" class="form-control" required onchange="calcDays()" style="color-scheme: light;">
                            </div>
                            <div class="form-group">
                                <label>Days</label>
                                <input type="number" name="days" id="fieldDays" class="form-control" readonly style="color: var(--accent-primary); font-weight: 700; background: #f8fafc;">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Reason <span style="color: #ef4444;">*</span></label>
                            <textarea name="reason" id="fieldReason" class="form-control" rows="3" style="resize: none;" required></textarea>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" onclick="closeLeaveModal()" class="btn-primary" style="background: #f1f5f9; color: var(--text-main);">Cancel</button>
                        <button type="submit" class="btn-primary">Submit Application</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function filterTable() {
                const status = document.getElementById('statusFilter').value;
                const rows = document.querySelectorAll('#leaveTable tbody tr');
                rows.forEach(row => {
                    if (status === 'All' || row.dataset.status === status) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            }

            function openLeaveModal() {
                document.getElementById('leaveForm').reset();
                document.getElementById('fieldId').value = '';
                document.getElementById('fieldStatus').value = 'Pending';
                document.getElementById('modalTitle').innerText = 'Apply Leave Request';
                document.getElementById('leaveModal').style.display = 'flex';
            }

            function closeLeaveModal() {
                document.getElementById('leaveModal').style.display = 'none';
            }

            function calcDays() {
                const f = document.getElementById('fieldFrom').value;
                const t = document.getElementById('fieldTo').value;
                if (f && t) {
                    const start = new Date(f);
                    const end = new Date(t);
                    if (end >= start) {
                        const diffTime = Math.abs(end - start);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                        document.getElementById('fieldDays').value = diffDays;
                    } else {
                        document.getElementById('fieldDays').value = 0;
                    }
                }
            }

            function editLeave(btn) {
                const tr = btn.closest('tr');
                document.getElementById('fieldId').value = tr.dataset.id;
                document.getElementById('fieldEmpId').value = tr.dataset.empid;
                document.getElementById('fieldType').value = tr.dataset.type;
                document.getElementById('fieldFrom').value = tr.dataset.from;
                document.getElementById('fieldTo').value = tr.dataset.to;
                document.getElementById('fieldDays').value = tr.dataset.days;
                document.getElementById('fieldReason').value = tr.dataset.reason || '';
                document.getElementById('fieldStatus').value = tr.dataset.status;
                
                document.getElementById('modalTitle').innerText = 'Edit Leave Request';
                document.getElementById('leaveModal').style.display = 'flex';
            }

            function deleteLeave(btn) {
                const tr = btn.closest('tr');
                showConfirm('Delete Request', 'Are you sure you want to delete leave request #' + tr.dataset.id + '?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/delete';
                    const idInput = document.createElement('input');
                    idInput.name = 'id';
                    idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form);
                    form.submit();
                });
            }

            function updateRowStatus(btn, newStatus) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                showConfirm(newStatus + ' Request', 'Mark leave request #' + id + ' as ' + newStatus + '?', () => {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/update-status';
                    
                    const idInput = document.createElement('input');
                    idInput.name = 'id';
                    idInput.value = id;
                    form.appendChild(idInput);
                    
                    const statusInput = document.createElement('input');
                    statusInput.name = 'status';
                    statusInput.value = newStatus;
                    form.appendChild(statusInput);
                    
                    document.body.appendChild(form);
                    form.submit();
                });
            }

        </script>
    </section>
</body>
</html>
