<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Leave Manager', 'leave')}">
<body>
    <section>
        <!-- Toolbar -->
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-weight: 600; color: #64748B;">Status:</span>
                    <select id="statusFilter" class="form-control" style="width: 150px;" onchange="filterTable()">
                        <option>All</option>
                        <option>Pending</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="openLeaveModal()"><i class="fas fa-plus"></i> Apply Leave</button>
                    <button class="btn-primary" style="background: #10B981;" onclick="updateStatus('Approved')"><i class="fas fa-check"></i> Approve</button>
                    <button class="btn-primary" style="background: #EF4444;" onclick="updateStatus('Rejected')"><i class="fas fa-times"></i> Reject</button>
                    <button class="btn-primary" style="background: #334155;" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card">
            <table id="leaveTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Emp ID</th>
                        <th>Name</th>
                        <th>Leave Type</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Days</th>
                        <th>Status</th>
                        <th>Applied On</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${leaves}" th:data-status="${l['status']}" th:data-id="${l['id']}" 
                        th:data-empid="${l['emp_id']}" th:data-type="${l['leave_type']}" th:data-from="${l['from_date']}" 
                        th:data-to="${l['to_date']}" th:data-days="${l['days']}" th:data-reason="${l['reason']}">
                        <td th:text="${l['id']}">1</td>
                        <td th:text="${l['emp_id']}">101</td>
                        <td th:text="${l['emp_name']}">John Doe</td>
                        <td th:text="${l['leave_type']}">Casual Leave</td>
                        <td th:text="${l['from_date']}">2026-05-06</td>
                        <td th:text="${l['to_date']}">2026-05-07</td>
                        <td th:text="${l['days']}">1.0</td>
                        <td>
                            <span th:text="${l['status']}" 
                                  th:classappend="${l['status'] == 'Approved' ? 'badge-success' : (l['status'] == 'Rejected' ? 'badge-danger' : 'badge-warning')}"
                                  class="badge">Pending</span>
                        </td>
                        <td th:text="${l['applied_on']}">2026-05-05</td>
                        <td>
                            <div class="action-col">
                                <button class="action-btn" style="color: #10B981;" title="Approve" onclick="updateRowStatus(this, 'Approved')"><i class="fas fa-check"></i></button>
                                <button class="action-btn" style="color: #EF4444;" title="Reject" onclick="updateRowStatus(this, 'Rejected')"><i class="fas fa-times"></i></button>
                                <button class="action-btn edit" title="Edit" onclick="editLeave(this)"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" onclick="deleteLeave(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Leave Application Modal -->
        <div id="leaveModal" class="modal">
            <!-- ... (existing modal content) ... -->
        </div>

        <script>
            function filterTable() {
                const status = document.getElementById('statusFilter').value;
                const rows = document.querySelectorAll('#leaveTable tbody tr');
                rows.forEach(row => {
                    if (status === 'All' || row.dataset.status === status) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            }

            function openLeaveModal() {
                document.getElementById('leaveForm').reset();
                document.getElementById('fieldId').value = '';
                document.getElementById('modalTitle').innerText = 'Apply Leave Request';
                document.getElementById('leaveModal').style.display = 'flex';
            }

            function closeLeaveModal() {
                document.getElementById('leaveModal').style.display = 'none';
            }

            function calcDays() {
                const start = new Date(document.getElementById('fieldFrom').value);
                const end = new Date(document.getElementById('fieldTo').value);
                if (start && end && end >= start) {
                    const diffTime = Math.abs(end - start);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    document.getElementById('fieldDays').value = diffDays;
                }
            }

            function editLeave(btn) {
                const tr = btn.closest('tr');
                document.getElementById('fieldId').value = tr.dataset.id;
                document.getElementById('fieldEmpId').value = tr.dataset.empid;
                document.getElementById('fieldType').value = tr.dataset.type;
                document.getElementById('fieldFrom').value = tr.dataset.from;
                document.getElementById('fieldTo').value = tr.dataset.to;
                document.getElementById('fieldDays').value = tr.dataset.days;
                document.getElementById('fieldReason').value = tr.dataset.reason || '';
                document.getElementById('fieldStatus').value = tr.dataset.status;
                
                document.getElementById('modalTitle').innerText = 'Edit Leave Request';
                document.getElementById('leaveModal').style.display = 'flex';
            }

            function deleteLeave(btn) {
                const tr = btn.closest('tr');
                if (confirm('Are you sure you want to delete leave request #' + tr.dataset.id + '?')) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/delete';
                    const idInput = document.createElement('input');
                    idInput.name = 'id';
                    idInput.value = tr.dataset.id;
                    form.appendChild(idInput);
                    document.body.appendChild(form);
                    form.submit();
                }
            }

            function updateRowStatus(btn, newStatus) {
                const tr = btn.closest('tr');
                const id = tr.dataset.id;
                if (confirm('Mark leave request #' + id + ' as ' + newStatus + '?')) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/leave/update-status';
                    
                    const idInput = document.createElement('input');
                    idInput.name = 'id';
                    idInput.value = id;
                    form.appendChild(idInput);
                    
                    const statusInput = document.createElement('input');
                    statusInput.name = 'status';
                    statusInput.value = newStatus;
                    form.appendChild(statusInput);
                    
                    document.body.appendChild(form);
                    form.submit();
                }
            }

            function updateStatus(newStatus) {
                alert('Please use the Approve/Reject icons in the Action column for individual requests.');
            }
        </script>
    </section>
</body>
</html>
