<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Masters', 'masters')}">
<body>
    <section>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
            <!-- Department Master -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h4>Departments</h4>
                    <button class="btn-primary" style="padding: 4px 8px; font-size: 12px;"><i class="fas fa-plus"></i></button>
                </div>
                <table>
                    <thead>
                        <tr><th>Name</th><th style="width: 50px;"></th></tr>
                    </thead>
                    <tbody>
                        <tr><td>HR</td><td><i class="fas fa-trash" style="color: #EF4444;"></i></td></tr>
                        <tr><td>Operations</td><td><i class="fas fa-trash" style="color: #EF4444;"></i></td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Designation Master -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h4>Designations</h4>
                    <button class="btn-primary" style="padding: 4px 8px; font-size: 12px;"><i class="fas fa-plus"></i></button>
                </div>
                <table>
                    <thead>
                        <tr><th>Name</th><th style="width: 50px;"></th></tr>
                    </thead>
                    <tbody>
                        <tr><td>Manager</td><td><i class="fas fa-trash" style="color: #EF4444;"></i></td></tr>
                        <tr><td>Supervisor</td><td><i class="fas fa-trash" style="color: #EF4444;"></i></td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Shift Master -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h4>Shifts</h4>
                    <button class="btn-primary" style="padding: 4px 8px; font-size: 12px;"><i class="fas fa-plus"></i></button>
                </div>
                <table>
                    <thead>
                        <tr><th>Shift</th><th>Timing</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>General</td><td>09:00 - 18:00</td></tr>
                        <tr><td>Night</td><td>20:00 - 05:00</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
