<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Daily Attendance', 'reports')}">
<body>
    <section>
        <!-- Filter Header -->
        <div class="card" style="margin-bottom: 20px; padding: 20px;">
            <form action="/reports/daily" method="get" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
                <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 10}">
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Select Date</label>
                    <input type="date" name="date" th:value="${selDate}" class="form-control" style="width: 200px;" required>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Department</label>
                    <select name="dept" class="form-control" style="width: 200px;">
                        <option>All</option>
                        <option th:each="d : ${depts}" th:value="${d['dept_name']}" th:text="${d['dept_name']}" th:selected="${selDept == d['dept_name']}"></option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Search</label>
                    <input type="text" name="search" th:value="${selSearch}" class="form-control" style="width: 200px;" placeholder="Emp ID or Name...">
                </div>
                <div style="display: flex; gap: 8px;">
                    <button type="submit" class="btn-primary" style="background: var(--accent-primary);"><i class="fas fa-file-alt"></i> Generate Report</button>
                    
                    <!-- Excel Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('Daily_Attendance.xls')" class="btn-primary" style="background: #10b981; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 10px 15px;" title="Export ALL records across all pages">
                            <i class="fas fa-database"></i> Full Excel
                        </button>
                        <button type="button" onclick="exportCurrentPage('Daily_Attendance.xls')" class="btn-primary" style="background: #059669; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 10px 12px;" title="Export current page only">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>

                    <!-- CSV Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('Daily_Attendance.csv')" class="btn-primary" style="background: #0d9488; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 10px 15px;" title="Export ALL records as CSV">
                            <i class="fas fa-file-csv"></i> Full CSV
                        </button>
                        <button type="button" onclick="exportCurrentPage('Daily_Attendance.csv')" class="btn-primary" style="background: #0f766e; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 10px 12px;" title="Export current page as CSV">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>
                </div>
                <div style="margin-left: auto; text-align: right;">
                    <h4 style="margin: 0; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">REPORT DATE</h4>
                    <p style="margin: 0; font-weight: 700; color: var(--accent-purple); font-size: 15px;" th:text="${selDate}">2026-05-11</p>
                </div>
            </form>
        </div>

        <!-- Report Results -->
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="mainDataTable" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f8fafc;">
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Emp ID</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Employee Name</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Department</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">In Time</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Out Time</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Work Hrs</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Break Time</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Net Working Hours</th>
                        <th style="padding: 15px 20px; font-weight: 700; color: var(--text-main); font-size: 11px;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${data}" style="border-bottom: 1px solid var(--glass-border);">
                        <td th:text="${r['emp_id']}" style="padding: 15px 20px; font-weight: 500; color: var(--text-muted);">101</td>
                        <td th:text="${r['emp_name']}" style="padding: 15px 20px; font-weight: 600; color: var(--text-main);">John Doe</td>
                        <td th:text="${r['department']}" style="padding: 15px 20px; color: var(--text-muted);">Development</td>
                        <td th:text="${r['punch_in'] ?: '--'}" style="padding: 15px 20px; color: #10B981; font-weight: 600;">09:00 AM</td>
                        <td th:text="${r['punch_out'] ?: '--'}" style="padding: 15px 20px; color: #60A5FA; font-weight: 600;">06:00 PM</td>
                        <td th:text="${r['work_hours'] ?: '0.0'}" th:data-details="${r['work_details']}" onclick="showDetailsModal('Work Hrs Details', this.getAttribute('data-details'))" style="padding: 15px 20px; font-weight: 600; color: var(--text-main); cursor: pointer; text-decoration: underline dotted;" title="Click for details">8.5</td>
                        <td th:text="${r['break_time'] ?: '00:00'}" th:data-details="${r['break_details']}" onclick="showDetailsModal('Break Time Details', this.getAttribute('data-details'))" style="padding: 15px 20px; font-weight: 600; color: #f59e0b; cursor: pointer; text-decoration: underline dotted;" title="Click for details">00:30</td>
                        <td th:text="${r['net_working_hours'] ?: '00:00'}" th:data-details="${r['net_details']}" onclick="showDetailsModal('Net Working Hours Details', this.getAttribute('data-details'))" style="padding: 15px 20px; font-weight: 600; color: #10b981; cursor: pointer; text-decoration: underline dotted;" title="Click for details">08:30</td>
                        <td style="padding: 15px 20px;">
                            <span class="badge" th:classappend="${r['status'] == 'Present' || r['status'] == 'OD' ? 'badge-success' : 'badge-danger'}">
                                <i th:class="${r['status'] == 'Present' || r['status'] == 'OD' ? 'fas fa-check-circle' : 'fas fa-user-slash'}"></i>
                                <span th:text="${r['status'] ?: 'Absent'}">Present</span>
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(data)}">
                        <td colspan="9" style="padding: 60px; text-align: center; color: #94A3B8;">
                            <i class="fas fa-folder-open" style="font-size: 48px; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                            No attendance records found for this criteria.
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/reports/daily')}"></div>
        </div>

        <style>
            @keyframes modalPop {
                0% { transform: scale(0.9) translateY(20px); opacity: 0; }
                100% { transform: scale(1) translateY(0); opacity: 1; }
            }
            @keyframes modalFadeIn {
                0% { opacity: 0; backdrop-filter: blur(0px); }
                100% { opacity: 1; backdrop-filter: blur(8px); }
            }
            .modal-box .close-btn:hover {
                color: #ef4444 !important;
                background: #fee2e2 !important;
                transform: rotate(90deg);
            }
            .detail-row:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
                border-color: #cbd5e1 !important;
            }
            .detail-row.total-row {
                background: linear-gradient(135deg, rgba(2, 132, 199, 0.05), rgba(2, 132, 199, 0.1)) !important;
                border-color: rgba(2, 132, 199, 0.2) !important;
            }
            .detail-row.total-row:hover {
                box-shadow: 0 4px 12px rgba(2, 132, 199, 0.15);
            }
        </style>

        <!-- Drill Down Modal -->
        <div id="detailsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center;">
            <div class="modal-box" style="background: #ffffff; padding: 0; border-radius: 20px; width: 420px; max-width: 90%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); position: relative; overflow: hidden; display: flex; flex-direction: column;">
                
                <!-- Header -->
                <div style="background: linear-gradient(to right, #f8fafc, #ffffff); padding: 20px 25px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
                    <h3 id="modalTitle" style="margin: 0; font-size: 18px; color: var(--text-main); font-weight: 800; display: flex; align-items: center;">
                        <i class="fas fa-info-circle" style="color: var(--accent-primary); margin-right: 10px;"></i> Details
                    </h3>
                    <button class="close-btn" onclick="closeDetailsModal()" style="background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: #64748b; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- Content -->
                <div id="modalContent" style="font-size: 14px; color: var(--text-muted); padding: 25px; max-height: 60vh; overflow-y: auto;">
                    <!-- Content injected here -->
                </div>
                
                <!-- Footer -->
                <div style="padding: 15px 25px; background: #f8fafc; border-top: 1px solid #e2e8f0; text-align: right; flex-shrink: 0;">
                    <button onclick="closeDetailsModal()" style="background: #ffffff; color: #475569; border: 1px solid #cbd5e1; box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 10px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Got it</button>
                </div>
            </div>
        </div>

        <script>
            function showDetailsModal(title, detailsStr) {
                // Set Title Icon dynamically based on context
                let titleIcon = 'fa-info-circle';
                let titleColor = 'var(--accent-primary)';
                if (title.includes('Break')) { titleIcon = 'fa-mug-hot'; titleColor = '#f59e0b'; }
                else if (title.includes('Work')) { titleIcon = 'fa-briefcase'; titleColor = '#10b981'; }
                
                document.getElementById('modalTitle').innerHTML = `<i class="fas ${titleIcon}" style="color: ${titleColor}; margin-right: 10px;"></i> ${title}`;
                
                let contentDiv = document.getElementById('modalContent');
                contentDiv.innerHTML = '';
                
                if (!detailsStr || detailsStr.includes('No records found') || detailsStr.includes('Incomplete')) {
                    contentDiv.innerHTML = `
                        <div style="text-align:center; padding: 30px 10px;">
                            <div style="width: 64px; height: 64px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                                <i class="fas fa-folder-open" style="font-size: 24px; color: #94a3b8;"></i>
                            </div>
                            <h4 style="margin: 0 0 5px; color: var(--text-main); font-size: 16px;">No Data</h4>
                            <p style="margin: 0; color: #64748b;">${detailsStr || 'Detailed records are currently unavailable.'}</p>
                        </div>`;
                } else {
                    let lines = detailsStr.split('|');
                    lines.forEach((line, idx) => {
                        if (!line.trim()) return;
                        
                        let isTotal = line.includes('Total') || line.includes('Net Working Hours');
                        let isBreak = line.includes('Break') && !isTotal;
                        let isIn = line.includes('IN');
                        let isOut = line.includes('OUT');
                        
                        let icon = 'fa-clock';
                        let iconColor = '#94a3b8';
                        let iconBg = '#f1f5f9';
                        
                        if (isTotal) { icon = 'fa-stopwatch'; iconColor = '#0284c7'; iconBg = 'rgba(2, 132, 199, 0.1)'; }
                        else if (isBreak) { icon = 'fa-mug-hot'; iconColor = '#f59e0b'; iconBg = 'rgba(245, 158, 11, 0.1)'; }
                        else if (isIn) { icon = 'fa-sign-in-alt'; iconColor = '#10b981'; iconBg = 'rgba(16, 185, 129, 0.1)'; }
                        else if (isOut) { icon = 'fa-sign-out-alt'; iconColor = '#ef4444'; iconBg = 'rgba(239, 68, 68, 0.1)'; }
                        
                        let textHtml = line;
                        if (line.includes('=')) {
                            let parts = line.split('=');
                            textHtml = `<span style="font-weight: 500;">${parts[0].trim()}</span> 
                                        <strong style="margin-left:auto; color:var(--text-main); font-size:15px; background:#ffffff; padding:4px 10px; border-radius:8px; border: 1px solid #e2e8f0; box-shadow:0 1px 2px rgba(0,0,0,0.02);">${parts[1].trim()}</strong>`;
                        } else if (line.includes(': ')) {
                            let parts = line.split(': ');
                            textHtml = `<span style="font-weight: 500;">${parts[0].trim()}:</span> 
                                        <strong style="margin-left:auto; color:var(--text-main); font-size:15px;">${parts[1].trim()}</strong>`;
                        }
                        
                        let delay = idx * 0.05; // Staggered animation
                        
                        let p = document.createElement('div');
                        p.className = 'detail-row ' + (isTotal ? 'total-row' : '');
                        p.style.cssText = `display: flex; align-items: center; padding: 14px 16px; margin: 8px 0; background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 14px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${delay}s both;`;
                        
                        if (isTotal) {
                            p.style.marginTop = '20px';
                        }
                        
                        p.innerHTML = `
                            <div style="width: 36px; height: 36px; border-radius: 10px; background: ${iconBg}; display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0;">
                                <i class="fas ${icon}" style="color: ${iconColor}; font-size: 15px;"></i>
                            </div>
                            <div style="display:flex; width:100%; align-items:center;">${textHtml}</div>
                        `;
                        contentDiv.appendChild(p);
                    });
                }
                
                let modal = document.getElementById('detailsModal');
                modal.style.display = 'flex';
                modal.style.animation = 'modalFadeIn 0.3s ease-out';
                
                let modalBox = modal.querySelector('.modal-box');
                modalBox.style.animation = 'none';
                modalBox.offsetHeight; /* trigger reflow */
                modalBox.style.animation = 'modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }

            function closeDetailsModal() {
                let modal = document.getElementById('detailsModal');
                modal.style.animation = 'none';
                modal.offsetHeight;
                modal.style.opacity = '0';
                setTimeout(() => {
                    modal.style.display = 'none';
                    modal.style.opacity = '1';
                }, 200);
            }
        </script>
    </section>
</body>
</html>
