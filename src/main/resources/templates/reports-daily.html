<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Daily Attendance Report', 'reports')}">
<body>
    <section>
        <!-- Filter Header -->
        <div class="card" style="margin-bottom: 20px; padding: 20px;">
            <form action="/reports/daily" method="get" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Select Date</label>
                    <input type="date" name="date" th:value="${selDate}" class="form-control" style="width: 200px;" required>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase;">Department</label>
                    <select name="dept" class="form-control" style="width: 200px;">
                        <option>All</option>
                        <option th:each="d : ${depts}" th:value="${d['dept_name']}" th:text="${d['dept_name']}" th:selected="${selDept == d['dept_name']}"></option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-primary"><i class="fas fa-sync"></i> Refresh Report</button>
                    <button type="button" class="btn-primary" style="background: #10B981;" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
                    <button type="button" class="btn-primary" style="background: #334155;"><i class="fas fa-file-excel"></i> Export</button>
                </div>
                <div style="margin-left: auto; text-align: right;">
                    <h4 style="margin: 0; color: #94A3B8; font-size: 12px;">REPORT DATE</h4>
                    <p style="margin: 0; font-weight: 700; color: var(--accent-purple);" th:text="${selDate}">2026-05-06</p>
                </div>
            </form>
        </div>

        <!-- Report Results -->
        <div class="card" style="padding: 0; overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead style="background: #F8FAFC;">
                    <tr>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">Emp ID</th>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">Employee Name</th>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">Department</th>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">In Time</th>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">Out Time</th>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">Work Hrs</th>
                        <th style="padding: 15px 20px; text-align: left; font-size: 11px; color: #64748B; text-transform: uppercase; border-bottom: 1px solid #E2E8F0;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${data}" style="border-bottom: 1px solid #F1F5F9;">
                        <td th:text="${r['emp_id']}" style="padding: 15px 20px; font-weight: 500;">101</td>
                        <td th:text="${r['emp_name']}" style="padding: 15px 20px; font-weight: 700; color: #1E293B;">John Doe</td>
                        <td th:text="${r['department']}" style="padding: 15px 20px; color: #64748B;">Development</td>
                        <td th:text="${r['punch_in'] ?: '--'}" style="padding: 15px 20px; color: #10B981; font-weight: 600;">09:00 AM</td>
                        <td th:text="${r['punch_out'] ?: '--'}" style="padding: 15px 20px; color: #6366F1; font-weight: 600;">06:00 PM</td>
                        <td th:text="${r['work_hours'] ?: '0.0'}" style="padding: 15px 20px; font-weight: 700;">8.5</td>
                        <td style="padding: 15px 20px;">
                            <span th:text="${r['status'] ?: 'Absent'}" 
                                  th:classappend="${(r['status'] == 'Present' || r['status'] == 'OD') ? 'badge-success' : 'badge-danger'}"
                                  class="badge">Present</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(data)}">
                        <td colspan="7" style="padding: 60px; text-align: center; color: #94A3B8;">
                            <i class="fas fa-folder-open" style="font-size: 48px; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                            No attendance records found for this criteria.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
