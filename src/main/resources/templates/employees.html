<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: main-layout(~{::section}, 'Employee Master', 'employees')}">

<body>
    <section>
        <div class="card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Employee Directory</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <form action="/employees" method="get" style="display: flex; gap: 10px;">
                        <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 10}">
                        <input type="text" name="search" th:value="${selSearch}" placeholder="Search employees..."
                            style="padding: 8px 12px; border: 1px solid #E2E8F0; border-radius: 6px;">
                        <button type="submit" class="btn-primary" style="background: #64748B;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </form>
                    <!-- Excel Export Group -->
                    <div style="display: flex; gap: 2px;">
                        <button type="button" onclick="performFullExport('Employees.xls')" class="btn-primary" style="background: #10b981; color: #fff; border-radius: 12px 0 0 12px; font-size: 13px; padding: 8px 12px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px;" title="Export ALL records across all pages">
                            <i class="fas fa-database"></i> Full Excel
                        </button>
                        <button type="button" onclick="exportCurrentPage('Employees.xls')" class="btn-primary" style="background: #059669; color: #fff; border-radius: 0 12px 12px 0; font-size: 13px; padding: 8px 10px; border: none; cursor: pointer; display: flex; align-items: center;" title="Export current page only">
                            <i class="fas fa-file-alt"></i> Page
                        </button>
                    </div>
                    <button type="button" class="btn-primary" style="background: rgba(13, 148, 136, 0.1); color: #2DD4BF; border: 1px solid rgba(13, 148, 136, 0.2); border-radius: 12px; font-size: 13px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;" onclick="exportTableToCSV('Employees.csv')">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button class="btn-primary" onclick="openModal()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                        Add Employee
                    </button>
                </div>
            </div>
            <table id="mainDataTable" class="table">
                <thead>
                    <tr>
                        <th>Emp ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Status</th>
                        <th style="width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employees}" style="border-bottom: 1px solid #eee;">
                        <td th:text="${emp['emp_id']}" style="padding: 12px;">001</td>
                        <td th:text="${emp['emp_name']}" style="padding: 12px; font-weight: bold;">Employee Name</td>
                        <td th:text="${emp['department']}" style="padding: 12px;">Department</td>
                        <td th:text="${emp['designation']}" style="padding: 12px;">Designation</td>
                        <td style="padding: 12px;">
                            <span class="badge"
                                th:classappend="${emp['status'] == 'Active' ? 'badge-success' : 'badge-danger'}">
                                <i
                                    th:class="${emp['status'] == 'Active' ? 'fas fa-check-circle' : 'fas fa-times-circle'}"></i>
                                <span th:text="${emp['status']}">Active</span>
                            </span>
                        </td>
                        <td style="padding: 12px;">
                            <div class="action-col">
                                <button class="action-btn edit" title="Edit" th:attr="data-id=${emp['emp_id']}"
                                    onclick="editEmployee(this.getAttribute('data-id'))"><i
                                        class="fas fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete" th:attr="data-id=${emp['emp_id']}"
                                    onclick="deleteEmp(this)"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>

            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/employees')}"></div>
        </div>

        <!-- Employee Modal -->
        <div id="empModal" class="modal">
            <div class="modal-content" style="width: 550px;">
                <div class="modal-header">
                    <h3 id="modalTitle">Add New Employee</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <form action="/employees/save" method="post" id="empForm" style="display: flex; flex-direction: column; height: 100%; overflow: hidden;">
                    <input type="hidden" name="is_edit" id="form_is_edit" value="false">
                    
                    <div class="modal-body">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Employee ID <span style="color: #ef4444;">*</span></label>
                                <input type="text" name="emp_id" id="form_emp_id" required class="form-control">
                            </div>
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Full Name <span style="color: #ef4444;">*</span></label>
                                <input type="text" name="emp_name" id="form_emp_name" required class="form-control">
                            </div>
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Department</label>
                                <select name="department" id="form_dept" class="form-control">
                                    <option value="">Select Dept</option>
                                    <option th:each="d : ${depts}" th:value="${d['dept_name']}" th:text="${d['dept_name']}">IT</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Designation</label>
                                <input type="text" name="designation" id="form_desig" class="form-control">
                            </div>
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Shift</label>
                                <select name="shift" id="form_shift" class="form-control">
                                    <option value="Day">Day</option>
                                    <option value="Night">Night</option>
                                    <option value="General">General</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-group-label" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Status</label>
                                <select name="status" id="form_status" class="form-control">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" onclick="closeModal()" class="btn-primary"
                            style="background: #f1f5f9; color: var(--text-main);">Cancel</button>
                        <button type="submit" class="btn-primary">Save Employee</button>
                    </div>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            const rawEmps = /*[[${employees}]]*/[];

            function openModal() {
                document.getElementById('modalTitle').innerText = 'Add New Employee';
                document.getElementById('empForm').reset();
                document.getElementById('form_is_edit').value = 'false';
                document.getElementById('form_emp_id').readOnly = false;
                document.getElementById('empModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('empModal').style.display = 'none';
            }

            function editEmployee(empId) {
                const emp = rawEmps.find(e => (e.emp_id || e['emp_id']) == empId);
                if (emp) {
                    document.getElementById('modalTitle').innerText = 'Edit Employee';
                    document.getElementById('form_is_edit').value = 'true';
                    document.getElementById('form_emp_id').value = emp.emp_id || emp['emp_id'];
                    document.getElementById('form_emp_id').readOnly = true;
                    document.getElementById('form_emp_name').value = emp.emp_name || emp['emp_name'];
                    document.getElementById('form_dept').value = emp.department || emp['department'] || '';
                    document.getElementById('form_desig').value = emp.designation || emp['designation'] || '';
                    document.getElementById('form_shift').value = emp.shift || emp['shift'] || 'General';
                    document.getElementById('form_status').value = emp.status || emp['status'] || 'Active';
                    document.getElementById('empModal').style.display = 'flex';
                }
            }

            function deleteEmp(btn) {
                const id = btn.getAttribute('data-id');
                showConfirm('Delete Employee', 'Are you sure you want to delete employee ID ' + id + '?', () => {
                    window.location.href = '/employees/delete/' + id;
                });
            }
        </script>
    </section>
</body>

</html>
