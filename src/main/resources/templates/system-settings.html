<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'System Information', 'system')}">
<body>
    <section>
        <div style="display: flex; justify-content: center; padding-top: 20px;">
            <div class="card" style="width: 100%; max-width: 650px; padding: 40px;">
                <h2 style="text-align: center; color: var(--accent-purple); margin-bottom: 30px; font-weight: 700;">
                    Application Infrastructure Profile
                </h2>
                
                <div style="display: grid; grid-template-columns: 200px 1fr; gap: 20px 40px;">
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">Application Name:</div>
                    <div th:text="${appName}" style="font-weight: 500; color: var(--text-main);">BHSPL Attendance</div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">Software Version:</div>
                    <div th:text="${version}" style="font-weight: 500; color: var(--text-main);">2.0.42</div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">Runtime Env:</div>
                    <div th:text="${runtime}" style="font-weight: 500; color: var(--text-main);">Java 17</div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">Core Framework:</div>
                    <div th:text="${framework}" style="font-weight: 500; color: var(--text-main);">Spring Boot</div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">Persistence:</div>
                    <div th:text="${db}" style="font-weight: 500; color: var(--text-main);">MySQL</div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">ADMS Protocol:</div>
                    <div th:text="${admsStatus}" 
                         th:style="${#strings.contains(admsStatus, 'Active') ? 'color: #10B981; font-weight: 700;' : 'color: #EF4444; font-weight: 700;'}">
                        Active
                    </div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">ADMS Port:</div>
                    <div th:text="${admsPort}" style="font-weight: 500; color: var(--text-main);">8081</div>
                    
                    <div style="text-align: right; font-weight: 700; color: var(--text-muted);">Module Status:</div>
                    <div style="color: #10B981; font-weight: 700;">Running / Connected</div>
                </div>
                
                <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--glass-border); display: flex; justify-content: center; gap: 15px;">
                    <button class="btn-primary" onclick="location.reload()" style="background: #f1f5f9; color: var(--text-main); border: 1px solid var(--glass-border);">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                    
                    <form th:if="${!#strings.contains(admsStatus, 'Active')}" th:action="@{/system/settings/start-adms}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-primary" style="background: #10B981;">
                            <i class="fas fa-play"></i> Start ADMS Service
                        </button>
                    </form>
                    
                    <form th:if="${#strings.contains(admsStatus, 'Active')}" th:action="@{/system/settings/stop-adms}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-primary" style="background: #EF4444;">
                            <i class="fas fa-stop"></i> Stop ADMS Service
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
