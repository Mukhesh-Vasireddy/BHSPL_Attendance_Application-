<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Raw Punch Log', 'raw-logs')}">
<body>
    <section>
        <!-- Filters Row -->
        <div class="card" style="margin-bottom: 25px; padding: 25px;">
            <form action="/raw-logs" method="get">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-bottom: 25px;">
                    <!-- Left Column -->
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <label style="width: 80px; font-weight: 600; color: var(--text-muted); font-size: 13px;">FROM:</label>
                            <input type="date" name="from" th:value="${selFrom}" class="form-control" style="width: 220px; color-scheme: dark;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <label style="width: 80px; font-weight: 600; color: var(--text-muted); font-size: 13px;">DEPT:</label>
                            <select name="dept" class="form-control" style="width: 220px;">
                                <option value="All">All Departments</option>
                                <option th:each="d : ${depts}" th:value="${d.dept_name}" th:text="${d.dept_name}" th:selected="${d.dept_name == selDept}"></option>
                            </select>
                        </div>
                    </div>
                    <!-- Right Column -->
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <label style="width: 80px; font-weight: 600; color: var(--text-muted); font-size: 13px;">TO:</label>
                            <input type="date" name="to" th:value="${selTo}" class="form-control" style="width: 220px; color-scheme: dark;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <label style="width: 80px; font-weight: 600; color: var(--text-muted); font-size: 13px;">EMPLOYEE:</label>
                            <select name="emp" class="form-control" style="width: 220px;">
                                <option value="All">All Employees</option>
                                <option th:each="e : ${employees}" th:value="${e.emp_id}" th:text="${e.emp_name}" th:selected="${e.emp_id == selEmp}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding: 12px 20px; background: rgba(99, 102, 241, 0.05); border-radius: 12px; border: 1px solid rgba(99, 102, 241, 0.2);">
                    <i class="fas fa-info-circle" style="color: var(--accent-primary);"></i>
                    <p style="margin: 0; color: var(--text-muted); font-size: 13px;">
                        Each row represents one punch session (IN/OUT pair) grouped per day.
                    </p>
                </div>

                <!-- Action Buttons -->
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button type="submit" class="btn-primary" style="background: var(--accent-primary); min-width: 140px;">
                        <i class="fas fa-sync-alt"></i> Refresh Data
                    </button>
                    <button type="submit" class="btn-primary" style="background: rgba(59, 130, 246, 0.1); color: #60A5FA; border: 1px solid rgba(59, 130, 246, 0.2);">
                        <i class="fas fa-file-invoice"></i> Generate Report
                    </button>
                    <a href="/system/sync?redirect=/raw-logs" class="btn-primary" style="background: rgba(239, 68, 68, 0.1); color: #F87171; border: 1px solid rgba(239, 68, 68, 0.2); text-decoration: none; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-calculator"></i> Recalculate
                    </a>
                    <button type="button" class="btn-primary" style="background: rgba(16, 185, 129, 0.1); color: #34D399; border: 1px solid rgba(16, 185, 129, 0.2);" onclick="exportTableToExcel('Raw_Punch_Logs.xls')">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button type="button" class="btn-primary" style="background: rgba(13, 148, 136, 0.1); color: #2DD4BF; border: 1px solid rgba(13, 148, 136, 0.2);" onclick="exportTableToCSV('Raw_Punch_Logs.csv')">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                </div>
            </form>
        </div>

        <!-- Data Table -->
        <div class="card" style="padding: 0; overflow-x: auto; margin-bottom: 25px;">
            <table>
                <thead>
                    <tr>
                        <th>Emp ID</th>
                        <th>Name</th>
                        <th>Dept</th>
                        <th>Shift</th>
                        <th>Date</th>
                        <th>IN Time</th>
                        <th>OUT Time</th>
                        <th style="text-align: center;">Punches</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${sessions}">
                        <td th:text="${row.emp_id}" style="color: var(--text-muted);">123</td>
                        <td th:text="${row.emp_name}" style="font-weight: 600; color: var(--text-main);">Anand</td>
                        <td th:text="${row.department}" style="color: var(--text-muted);">IT</td>
                        <td th:text="${row.shift}" style="color: var(--text-muted);">General</td>
                        <td th:text="${row.date}" style="color: var(--text-muted);">2026-05-11</td>
                        <td th:text="${row.in_time}" style="color: var(--text-main); font-weight: 500;">09:21 am</td>
                        <td th:text="${row.out_time}" style="color: var(--text-main); font-weight: 500;">09:51 am</td>
                        <td th:text="${row.punch_count}" style="text-align: center; color: var(--text-main);">7</td>
                        <td>
                            <span th:text="${row.status}" 
                                  th:style="${row.status == 'Present' ? 'color: #10B981;' : 'color: #EF4444;'}"
                                  style="font-weight: 700;">Present</span>
                        </td>
                    </tr>
                    <tr th:if="${sessions == null or sessions.empty}">
                        <td colspan="9" style="text-align: center; padding: 60px; color: #94A3B8;">
                            No session data found for the selected criteria.
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/raw-logs')}"></div>
        </div>



        <script th:inline="javascript">
            // Simple helper for excel/csv export if needed
        </script>
    </section>
</body>
</html>
