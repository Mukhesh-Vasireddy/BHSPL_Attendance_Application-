<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Raw Punch Log', 'raw-logs')}">
<body>
    <section>
        <!-- Filters Row -->
        <div class="card" style="margin-bottom: 20px; padding: 20px;">
            <form action="/raw-logs" method="get">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-bottom: 20px;">
                    <!-- Left Column -->
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <label style="width: 80px; font-weight: 600; color: #475569;">From:</label>
                            <input type="date" name="from" th:value="${selFrom}" class="form-control" style="width: 200px;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <label style="width: 80px; font-weight: 600; color: #475569;">Dept:</label>
                            <select name="dept" class="form-control" style="width: 200px;">
                                <option value="All">All</option>
                                <option th:each="d : ${depts}" th:value="${d.dept_name}" th:text="${d.dept_name}" th:selected="${d.dept_name == selDept}">IT</option>
                            </select>
                        </div>
                    </div>
                    <!-- Right Column -->
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <label style="width: 80px; font-weight: 600; color: #475569;">To:</label>
                            <input type="date" name="to" th:value="${selTo}" class="form-control" style="width: 200px;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <label style="width: 80px; font-weight: 600; color: #475569;">Employee:</label>
                            <select name="emp" class="form-control" style="width: 200px;">
                                <option value="All">All</option>
                                <option th:each="e : ${employees}" th:value="${e.emp_id}" th:text="${e.emp_name}" th:selected="${e.emp_id == selEmp}">Employee</option>
                            </select>
                        </div>
                    </div>
                </div>

                <p style="color: #8E0E6C; font-size: 13px; margin-bottom: 25px;">
                    Each row represents one punch session (IN/OUT pair) grouped per day.
                </p>

                <!-- Action Buttons -->
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button type="submit" class="refresh-btn" style="background: #6366F1; min-width: 130px; justify-content: center;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        Refresh Data
                    </button>
                    <button type="button" class="refresh-btn" style="background: #1E3A8A;" onclick="alert('Generating Advanced Report...')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Generate Report
                    </button>
                    <a href="/system/sync?redirect=/raw-logs" class="refresh-btn" style="background: #991B1B; text-decoration: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        Recalculate
                    </a>
                    <button type="button" class="refresh-btn" style="background: #166534;" onclick="exportTableToExcel('Raw_Punch_Logs.xls')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Export to Excel
                    </button>
                    <button type="button" class="refresh-btn" style="background: #0D9488;" onclick="exportTableToCSV('Raw_Punch_Logs.csv')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Export to CSV
                    </button>
                </div>
            </form>
        </div>

        <!-- Data Table -->
        <div class="card" style="padding: 0; overflow: hidden;">
            <table class="table" style="margin: 0;">
                <thead>
                    <tr style="background: #800080; color: white;">
                        <th style="padding: 12px 20px;">Emp ID</th>
                        <th style="padding: 12px 20px;">Name</th>
                        <th style="padding: 12px 20px;">Dept</th>
                        <th style="padding: 12px 20px;">Shift</th>
                        <th style="padding: 12px 20px;">Date</th>
                        <th style="padding: 12px 20px;">IN Time</th>
                        <th style="padding: 12px 20px;">OUT Time</th>
                        <th style="padding: 12px 20px;">Punches</th>
                        <th style="padding: 12px 20px;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${sessions}" style="border-bottom: 1px solid #f1f5f9;">
                        <td th:text="${row.emp_id}" style="padding: 12px 20px; color: #475569;">123</td>
                        <td th:text="${row.emp_name}" style="padding: 12px 20px; font-weight: 500; color: #1E293B;">Anand</td>
                        <td th:text="${row.department}" style="padding: 12px 20px; color: #64748B;">Information Technology</td>
                        <td th:text="${row.shift}" style="padding: 12px 20px; color: #64748B;">General</td>
                        <td th:text="${row.date}" style="padding: 12px 20px; color: #64748B;">2026-05-06</td>
                        <td th:text="${row.in_time}" style="padding: 12px 20px; color: #475569;">09:21 am</td>
                        <td th:text="${row.out_time}" style="padding: 12px 20px; color: #475569;">09:51 am</td>
                        <td th:text="${row.punch_count}" style="padding: 12px 20px; text-align: center; color: #475569;">7</td>
                        <td style="padding: 12px 20px;">
                            <span th:text="${row.status}" 
                                  th:style="${row.status == 'Present' ? 'color: #16A34A' : 'color: #DC2626'}"
                                  style="font-weight: 700;">Present</span>
                        </td>
                    </tr>
                    <tr th:if="${sessions == null or sessions.empty}">
                        <td colspan="9" style="text-align: center; padding: 50px; color: #94A3B8;">
                            No session data found for the selected criteria.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
