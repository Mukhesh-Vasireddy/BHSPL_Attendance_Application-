<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: main-layout(~{::section}, 'Attendance Exceptions', 'reports')}">
<body>
    <section>
        <div class="module-header">
            <div>
                <h2 class="module-title">Attendance Exceptions</h2>
                <div class="module-sub">Identify and resolve missing or unmatched punch logs</div>
            </div>
        </div>

        <!-- Filter Header -->
        <div class="filter-bar" style="margin-bottom: 20px;">
            <form action="/reports/exceptions" method="get" autocomplete="off" style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 10}">
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Select Date</label>
                    <input type="date" name="date" th:value="${selDate}" autocomplete="off" class="form-control" style="width: 170px;">
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Department</label>
                    <select name="dept" class="form-control" style="width: 180px;">
                        <option>All</option>
                        <option th:each="d : ${depts}" th:value="${d['dept_name']}" th:text="${d['dept_name']}" th:selected="${selDept == d['dept_name']}"></option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Search</label>
                    <input type="text" name="search" th:value="${selSearch}" autocomplete="off" class="form-control" style="width: 180px;" placeholder="Emp ID or Name...">
                </div>
                <div style="display: flex; gap: 8px;">
                    <button type="submit" class="btn-primary" style="background: var(--accent-primary);"><i class="fas fa-filter"></i> Filter</button>
                    <button type="button" onclick="exportTableToCSV('Attendance_Exceptions.csv')" class="btn-primary" style="background: #0d9488; color: #fff;">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                </div>
            </form>
        </div>

        <!-- Report Results -->
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="mainDataTable" class="table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Emp ID</th>
                        <th>Employee Name</th>
                        <th>Department</th>
                        <th>First In</th>
                        <th>Last Out</th>
                        <th style="color: #EF4444;">Exception Reason</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${data}">
                        <td th:text="${#strings.substring(r['punch_date'], 0, 10)}" style="font-weight: 600; color: var(--text-main);">2026-05-11</td>
                        <td th:text="${r['emp_id']}" style="font-weight: 500; color: var(--text-muted);">101</td>
                        <td th:text="${r['emp_name']}" style="font-weight: 600; color: var(--text-main);">John Doe</td>
                        <td th:text="${r['department']}" style="color: var(--text-muted);">Development</td>
                        <td th:text="${r['in_time'] != null ? #strings.substring(r['in_time'], 11, 16) : '--'}" style="color: #10B981; font-weight: 600;">09:00</td>
                        <td th:text="${r['out_time'] != null ? #strings.substring(r['out_time'], 11, 16) : '--'}" style="color: #3b82f6; font-weight: 600;">18:00</td>
                        <td>
                            <span class="badge badge-danger">
                                <i class="fas fa-exclamation-triangle"></i> <span th:text="${r['exceptions']}">Missing IN</span>
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(data)}">
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="fas fa-check-circle" style="color: #10B981;"></i>
                                <p>No attendance exceptions found for this criteria!</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="padding: 15px;">
                <div th:replace="~{fragments :: pagination(${currentPage}, ${totalPages}, '/reports/exceptions')}"></div>
            </div>
        </div>
    </section>
</body>
</html>
