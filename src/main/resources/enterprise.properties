# Enterprise Light Theme - Custom Defaults for FlatLaf
# This file acts like "CSS" for the Java Swing application.

# -- Colors (Extracted from BAVYA Logo) --
@primary = #8E0E6C
@primaryHover = #701056
@primaryPressed = #5A0A44

@accent = #D8005A
@orange = #F99D1C
@gold = #FFB74D
@deepPurple = #4C1D95

@bgMain = #F8FAFC
@bgCard = #FFFFFF
@border = #E2E8F0

@textDark = #0F172A
@textLight = #64748B
@textMuted = #94A3B8

@success = #059669
@warning = @orange
@danger = @accent

# -- Arcs --
Button.arc = 12
Component.arc = 12
CheckBox.arc = 4
ProgressBar.arc = 12
TextComponent.arc = 12
ScrollBar.thumbArc = 999
ScrollBar.trackArc = 999

# -- Components --
Button.background = @primary
Button.foreground = #FFFFFF
Button.hoverBackground = @primaryHover
Button.pressedBackground = @primaryPressed
Button.font = 14 bold
Button.innerFocusWidth = 0
Button.focusWidth = 2
Button.focusColor = #C7D2FE

# Text Fields
TextField.background = #FFFFFF
TextField.borderColor = @border
TextField.focusedBorderColor = @primary
TextField.padding = 10,14,10,14
TextField.placeholderForeground = @textMuted

PasswordField.background = #FFFFFF
PasswordField.borderColor = @border
PasswordField.focusedBorderColor = @primary
PasswordField.padding = 10,14,10,14
PasswordField.placeholderForeground = @textMuted

# Tables
Table.rowHeight = 48
Table.showHorizontalLines = true
Table.showVerticalLines = false
Table.gridColor = @border
Table.selectionBackground = #EEF2FF
Table.selectionForeground = @textDark
Table.font = 14
Table.alternateRowColor = #FDFDFD

TableHeader.background = @bgMain
TableHeader.foreground = @textLight
TableHeader.font = 13 bold
TableHeader.height = 44
TableHeader.separatorColor = @border
TableHeader.bottomSeparatorColor = @border

# ScrollBars
ScrollBar.width = 12
ScrollBar.thumb = #CBD5E1
ScrollBar.track = transparent
ScrollBar.thumbInsets = 2,2,2,2

# Panels
Panel.background = @bgMain

# TabbedPane
TabbedPane.selectedBackground = @bgCard
TabbedPane.selectedForeground = @primary
TabbedPane.underlineColor = @primary
TabbedPane.showTabSeparators = false
TabbedPane.tabInsets = 12,24,12,24
TabbedPane.font = 14 bold

# Labels
Label.font = 14
Label.foreground = @textDark

# Tooltips
ToolTip.background = @textDark
ToolTip.foreground = #FFFFFF
ToolTip.border = 4,8,4,8
